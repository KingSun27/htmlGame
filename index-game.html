function cnNum(n){ if(n<=10) return CN[n]; if(n<20) return '十'+(n%10?CN[n%10]:''); return CN[Math.floor(n/10)]+'十'+(n%10?CN[n%10]:''); }

const canvas = document.getElementById('game');

let W = 400, H = 600, DPR = 1, SCALE = 1;
let GAME_W = 400, GAME_H = 600;
let WORLD_SCALE = 1;

function resize() {
  DPR = window.devicePixelRatio || 1;
  let vw = window.innerWidth, vh = window.innerHeight;
  W = vw; H = vh;
  W = Math.floor(W); H = Math.floor(H);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  GAME_W = W; GAME_H = H;
  SCALE = Math.min(W / 400, H / 600);
  if (SCALE < 0.6) SCALE = 0.6;
  const isPortrait = H > W * 1.1;
  if (isPortrait) {
    WORLD_SCALE = W / (10 * TILE);
  } else {
    WORLD_SCALE = (H * 0.85) / (14 * TILE);
  }
  if (WORLD_SCALE < 0.8) WORLD_SCALE = 0.8;
  if (WORLD_SCALE > 2) WORLD_SCALE = 2;
}
resize();
window.addEventListener('resize', resize);

// SECTION 2: CHARACTER ATLAS CACHE
// =============================================================
const atlas = { cache: new Map(), _order: [] };
atlas.key = (c,s,col) => c+'|'+s+'|'+col;
atlas.pre = function(c,s,col) {
  const k = this.key(c,s,col);
  if (this.cache.has(k)) return;
  // Evict oldest entries if cache is too large
  if (this.cache.size > 400) {
    const toRemove = this._order.splice(0, 100);
    for (const rk of toRemove) this.cache.delete(rk);
  }
  const cv = document.createElement('canvas');
  const cx = cv.getContext('2d');
  cx.font = 'bold '+s+'px '+FONT_FAMILY;
  const m = cx.measureText(c);
  cv.width = Math.ceil(m.width)+6;
  cv.height = Math.ceil(s*1.4)+6;
  cx.font = 'bold '+s+'px '+FONT_FAMILY;
  cx.fillStyle = col;
  cx.textBaseline = 'top';
  cx.fillText(c, 3, 3);
  this.cache.set(k, { cv, w: cv.width, h: cv.height });
  this._order.push(k);
};
atlas.draw = function(ctx, c, s, col, x, y, alpha) {
  s = Math.round(s);
  const k = this.key(c,s,col);
  let e = this.cache.get(k);
  if (!e) { this.pre(c,s,col); e = this.cache.get(k); }
  if (!e || !e.cv) return e;
  if (alpha !== undefined && alpha < 1) { ctx.globalAlpha = alpha; }
  ctx.drawImage(e.cv, (x|0)-3, (y|0)-3);
  if (alpha !== undefined && alpha < 1) { ctx.globalAlpha = 1; }
  return e;
};
atlas.measure = function(c,s,col) {
  const k = this.key(c,s,col||'#000');
  let e = this.cache.get(k);
  if (!e) { this.pre(c,s,col||'#000'); e = this.cache.get(k); }
  return { w: e.w-6, h: e.h-6 };
};

// =============================================================
// SECTION 3: INPUT SYSTEM
// =============================================================
const input = { left:false, right:false, jump:false, attack:false, interact:false, jumpPressed:false, attackPressed:false, jumpBuffer:0 };
const keys = {};
let godMode = false;
let godBuf = '';
let godLevelInput = '';
document.addEventListener('keydown', e => {
  keys[e.key]=true;
  e.preventDefault();
  // God mode activation: type "god" consecutively
  godBuf += e.key.toLowerCase();
  if (godBuf.length > 10) godBuf = godBuf.slice(-10);
  if (godBuf.endsWith('god')) {
    godMode = !godMode;
    godBuf = '';
    godLevelInput = '';
  }
  // God mode: type number then press Enter to switch level
  if (godMode && e.key >= '0' && e.key <= '9') {
    godLevelInput += e.key;
  }
  if (godMode && e.key === 'Enter' && godLevelInput.length > 0) {
    const lvIdx = parseInt(godLevelInput, 10);
    godLevelInput = '';
    if (lvIdx >= 0 && lvIdx < LEVELS.length) {
      startLevel(lvIdx);
    }
  }
  if (godMode && e.key === 'Backspace') {
    godLevelInput = godLevelInput.slice(0, -1);
  }
  if (godMode && e.key === 'Escape') {
    godLevelInput = '';
  }
  // Menu keyboard navigation
  if (scene === 'title') {
    const k = e.key;
    if (menuState === 'main') {
      if (k==='ArrowUp'||k==='w'||k==='W') { menuSel = (menuSel+2)%3; }
      else if (k==='ArrowDown'||k==='s'||k==='S') { menuSel = (menuSel+1)%2; }
      else if (k==='Enter'||k===' '||k==='z'||k==='Z'||k==='j'||k==='J') {
        if (menuSel===0) { resetPlayer(); storyChars.length=0; startLevel(0); }
        else if (menuSel===1) { menuState='controls'; menuSel=0; }
      }
    } else if (menuState === 'controls') {
      if (k==='Escape'||k==='Enter'||k===' '||k==='z'||k==='Z'||k==='j'||k==='J') {
        menuState='main'; menuSel=1;
      }
    }
  }
  // Death screen keyboard navigation
  if (scene === 'death') {
    const k = e.key;
    if (k==='ArrowUp'||k==='w'||k==='W') { deathMenuSel = 0; }
    else if (k==='ArrowDown'||k==='s'||k==='S') { deathMenuSel = 1; }
    else if (k==='Enter'||k===' '||k==='z'||k==='Z'||k==='j'||k==='J') { handleMenuAction(); }
  }
  // Victory screen keyboard
  if (scene === 'victory') {
    const k = e.key;
    if (k==='Enter'||k===' '||k==='z'||k==='Z'||k==='j'||k==='J') { handleMenuAction(); }
  }
});
document.addEventListener('keyup', e => { keys[e.key]=false; });
function updateKeyboardInput() {
  input.left = !!(keys['ArrowLeft']||keys['a']||keys['A']);
  input.right = !!(keys['ArrowRight']||keys['d']||keys['D']);
  let jmp = !!(keys['ArrowUp']||keys['w']||keys['W']||keys[' ']);
  input.jumpPressed = jmp && !input.jump;
  input.jump = jmp;
  let atk = !!(keys['z']||keys['Z']||keys['j']||keys['J']);
  input.attackPressed = atk && !input.attack;
  input.attack = atk;
  input.interact = !!(keys['e']||keys['E']);
}

// Touch controls
const touchState = { left:false, right:false, jump:false, attack:false };
const touchIds = new Map();
const touchBtns = [
  { id:'left',  rx:0,    ry:0.82, rw:0.2, rh:0.18, label:'左', col:'#999' },
  { id:'right', rx:0.2,  ry:0.82, rw:0.2, rh:0.18, label:'右', col:'#999' },
  { id:'jump',  rx:0.6,  ry:0.82, rw:0.2, rh:0.18, label:'跳', col:'#4CAF50' },
  { id:'attack',rx:0.8,  ry:0.82, rw:0.2, rh:0.18, label:'攻', col:'#F44336' },
];
function getTouchBtn(tx,ty) {
  for (const b of touchBtns) {
    if (tx >= b.rx*W && tx < (b.rx+b.rw)*W && ty >= b.ry*H && ty < (b.ry+b.rh)*H) return b.id;
  }
  return null;
}
// Mobile god mode: sequence left,left,right,right,jump,jump,attack,attack
const GOD_SEQ = ['left','left','right','right','jump','jump','attack','attack'];
const touchGodBuf = [];
let godMobileLevelSel = 0;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const bid = getTouchBtn(t.clientX - canvas.getBoundingClientRect().left, t.clientY - canvas.getBoundingClientRect().top);
    if (bid) {
      touchIds.set(t.identifier, bid);
      // God mode level selection on mobile — consume input, don't pass to game
      if (godMode && ('ontouchstart' in window)) {
        if (bid === 'left')  godMobileLevelSel = Math.max(0, godMobileLevelSel - 1);
        if (bid === 'right') godMobileLevelSel = Math.min(LEVELS.length - 1, godMobileLevelSel + 1);
        if (bid === 'jump')  { startLevel(godMobileLevelSel); }
        if (bid === 'attack'){ godMode = false; }
        touchGodBuf.length = 0;
      } else {
        touchState[bid] = true;
        // Track sequence for god mode activation
        touchGodBuf.push(bid);
        if (touchGodBuf.length > GOD_SEQ.length) touchGodBuf.shift();
        if (touchGodBuf.length === GOD_SEQ.length && touchGodBuf.every((v,i) => v === GOD_SEQ[i])) {
          godMode = true;
          godMobileLevelSel = currentLevel || 0;
          touchGodBuf.length = 0;
        }
      }
    }
  }
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const b of touchBtns) touchState[b.id] = false;
  for (const t of e.touches) {
    const bid = getTouchBtn(t.clientX - canvas.getBoundingClientRect().left, t.clientY - canvas.getBoundingClientRect().top);
    if (bid) { touchIds.set(t.identifier, bid); touchState[bid] = true; }
  }
}, {passive:false});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const bid = touchIds.get(t.identifier);
    if (bid) { touchState[bid] = false; touchIds.delete(t.identifier); }
  }
}, {passive:false});
canvas.addEventListener('touchcancel', e => {
  for (const t of e.changedTouches) {
    const bid = touchIds.get(t.identifier);
    if (bid) { touchState[bid] = false; touchIds.delete(t.identifier); }
  }
}, {passive:false});
function updateTouchInput() {
  if (touchState.left) input.left = true;
  if (touchState.right) input.right = true;
  if (touchState.jump) { if (!input.jump) input.jumpPressed = true; input.jump = true; }
  if (touchState.attack) { if (!input.attack) input.attackPressed = true; input.attack = true; }
}

// =============================================================
// SECTION 4: CAMERA
// =============================================================
const cam = { x:0, y:0, shakeX:0, shakeY:0, shakeT:0, shakeI:0 };
cam.follow = function(tx,ty,lw,lh,dt) {
  const vw = GAME_W / WORLD_SCALE;
  const vh = GAME_H / WORLD_SCALE;
  const isMobile = ('ontouchstart' in window);
  const playableH = isMobile ? vh * 0.82 : vh;
  const mobileShift = isMobile ? TILE / 2 : 0;
  const targetX = tx - vw/2;
  const targetY = ty - playableH * 0.45;
  this.x += (targetX - this.x) * Math.min(1, 6*dt);
  this.y += (targetY - this.y) * Math.min(1, 6*dt);
  this.x = Math.max(0, Math.min(this.x, Math.max(0, lw - vw)));
  if (lh <= playableH) {
    this.y = -(playableH - lh) / 2 - mobileShift;
  } else {
    const maxY = lh - playableH;
    this.y = Math.max(0 - mobileShift, Math.min(this.y, maxY));
  }
};
cam.shake = function(i,d) { this.shakeT=d; this.shakeI=i; };
cam.update = function(dt) {
  if (this.shakeT>0) { this.shakeT-=dt; this.shakeX=(Math.random()-0.5)*this.shakeI; this.shakeY=(Math.random()-0.5)*this.shakeI; }
  else { this.shakeX=0; this.shakeY=0; }
};
// Instant snap camera to player (no smooth pan)
cam.snap = function(px, py, lw, lh) {
  const vw = GAME_W / WORLD_SCALE;
  const vh = GAME_H / WORLD_SCALE;
  const isMobile = ('ontouchstart' in window);
  const playableH = isMobile ? vh * 0.82 : vh;
  const mobileShift = isMobile ? TILE / 2 : 0;
  this.x = px - vw/2;
  this.y = py - playableH * 0.45;
  this.x = Math.max(0, Math.min(this.x, Math.max(0, lw - vw)));
  if (lh <= playableH) {
    this.y = -(playableH - lh) / 2 - mobileShift;
  } else {
    this.y = Math.max(0 - mobileShift, Math.min(this.y, lh - playableH));
  }
  this.shakeX = 0; this.shakeY = 0; this.shakeT = 0;
};

// =============================================================
// SECTION 5: PARTICLE SYSTEM
// =============================================================
const particles = [];
const _pendingParticles = [];
let _renderPhase = false;
function addParticle(c,x,y,vx,vy,col,sz,life,grav) {
  const p = {c,x,y,vx,vy,col,sz,life,maxLife:life,grav:grav||0};
  if (_renderPhase) { _pendingParticles.push(p); return; }
  if (particles.length > 300) particles.splice(0, 50);
  particles.push(p);
}
function flushPendingParticles() {
  for (let i=0;i<_pendingParticles.length;i++) {
    if (particles.length > 300) particles.splice(0, 50);
    particles.push(_pendingParticles[i]);
  }
  _pendingParticles.length = 0;
}
function updateParticles(dt) {
  let writeIdx = 0;
  for (let i=0;i<particles.length;i++) {
    const p=particles[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=p.grav*dt;
    p.life-=dt;
    if (p.life>0) {
      particles[writeIdx++]=p;
    }
  }
  particles.length = writeIdx;
}
function renderParticles(ctx) {
  for (const p of particles) {
    const a = Math.max(0, p.life/p.maxLife);
    const s = Math.max(4, Math.round(p.sz * a));
    atlas.draw(ctx, p.c, s, p.col, p.x - cam.x + cam.shakeX, p.y - cam.y + cam.shakeY, a);
  }
}

let levelMap = [];
let levelW = 0, levelH = 0;
let mapMonsters = [];
let mapItems = [];

function loadLevel(data) {
  const rows = data.trim().split('\n');
  levelH = rows.length;
  levelW = 0;
  levelMap = [];
  mapMonsters = [];
  mapItems = [];
  for (let r=0;r<rows.length;r++) {
    const chars = Array.from(rows[r]);
    if (chars.length > levelW) levelW = chars.length;
    for (let c=0;c<chars.length;c++) {
      const ch = chars[c];
      if (MONSTER_CHARS[ch]) {
        mapMonsters.push([MONSTER_CHARS[ch], c, r]);
        chars[c] = '。';
      } else if (ITEM_CHARS[ch] && !TILE_DEF[ch]) {
        mapItems.push([ITEM_CHARS[ch], c, r]);
        chars[c] = '。';
      }
    }
    levelMap.push(chars);
  }
  for (let r=0;r<levelMap.length;r++) {
    const row = levelMap[r];
    let padChar = row.length > 0 ? row[row.length - 1] : '。';
    if (padChar === '路') padChar = '。';
    while(row.length < levelW) row.push(padChar);
  }
}

function getTile(gx,gy) {
  if (gx<0||gy<0||gy>=levelH||gx>=levelW) return null;
  const ch = levelMap[gy]?.[gx];
  return TILE_DEF[ch] || null;
}

function setTile(gx,gy,ch) {
  if (gx>=0&&gy>=0&&gy<levelH&&gx<levelW) levelMap[gy][gx]=ch;
}

function isSolid(gx,gy) {
  const t = getTile(gx,gy);
  return t && t.solid;
}

function isPlatform(gx,gy) {
  const t = getTile(gx,gy);
  return t && t.platform;
}

// Get surface type of the tile below an entity's feet
function getSurfaceBelow(ent) {
  const cx = Math.floor((ent.x+ent.w/2)/TILE);
  const footY = Math.floor((ent.y+ent.h+2)/TILE);
  const t = getTile(cx, footY);
  if (t && t.surface) return t.surface;
  return null;
}

function renderTiles(ctx) {
  const sx = Math.max(0, Math.floor(cam.x/TILE)|0);
  const sy = Math.max(0, Math.floor(cam.y/TILE)|0);
  const ex = Math.min(levelW, Math.ceil((cam.x+GAME_W)/TILE)+1);
  const ey = Math.min(levelH, Math.ceil((cam.y+GAME_H)/TILE)+1);
  for (let y=sy;y<ey;y++) {
    for (let x=sx;x<ex;x++) {
      const ch = levelMap[y]?.[x];
      const td = TILE_DEF[ch];
      if (!td) continue;
      const dx = x*TILE - cam.x + cam.shakeX;
      const dy = y*TILE - cam.y + cam.shakeY;
      let col = td.col;
      // water animation
      if (ch === '水') {
        const wave = Math.sin(Date.now()*0.003 + x*0.5)*0.5+0.5;
        col = wave > 0.5 ? '#29B6F6' : '#0288D1';
      }
      if (ch === '熔') {
        const wave = Math.sin(Date.now()*0.003 + x*0.5)*0.5+0.5;
        col = wave > 0.5 ? '#E65100' : '#F95120';
      }
      // mud bubbling
      if (ch === '泥' && Math.random()<0.01) {
        addParticle('泥', x*TILE+Math.random()*TILE, y*TILE, (Math.random()-0.5)*10, -15, '#8B7355', 8, 0.5, 100);
      }
      // swamp bubbling
      if (ch === '沼') {
        const wave = Math.sin(Date.now()*0.002 + x*0.7)*0.5+0.5;
        col = wave > 0.5 ? '#558B2F' : '#33691E';
        if (Math.random()<0.015) addParticle('毒', x*TILE+Math.random()*TILE, y*TILE, (Math.random()-0.5)*8, -20, '#4CAF50', 8, 0.6, 50);
      }
      // wind animation
      if (ch === '风' && Math.random()<0.02) {
        addParticle('风', x*TILE, y*TILE+Math.random()*TILE, 60+Math.random()*40, (Math.random()-0.5)*10, '#90CAF9', 10, 0.6, 0);
      }
      // fog animation
      if (ch === '雾' && Math.random()<0.008) {
        addParticle('雾', x*TILE+Math.random()*TILE, y*TILE+Math.random()*TILE, (Math.random()-0.5)*15, (Math.random()-0.5)*10, '#B0BEC5', 12, 0.6, 0);
      }
      // cloud drift
      if (ch === '云') {
        const drift = Math.sin(Date.now()*0.0006 + y*1.5)*12 + Math.sin(Date.now()*0.0015 + x*0.8)*4;
        atlas.draw(ctx, td.c, TILE-8, col, dx+4+drift, dy+4);
        continue;
      }
      // bounce pad pulse
      if (ch === '弹') {
        const pulse = Math.sin(Date.now()*0.006)*0.15+0.85;
        ctx.save();
        ctx.globalAlpha = pulse;
        atlas.draw(ctx, td.c, TILE-8, col, dx+4, dy+4);
        ctx.restore();
        continue;
      }
      // vine sway
      if (ch === '藤') {
        const sway = Math.sin(Date.now()*0.002+x*2)*2;
        atlas.draw(ctx, td.c, TILE-8, col, dx+4+sway, dy+4);
        continue;
      }
      atlas.draw(ctx, td.c, TILE-8, col, dx+4, dy+4);
      // Torch light particles
      if (ch === '灯' && Math.random()<0.05) {
        addParticle('光', x*TILE+8, y*TILE, (Math.random()-0.5)*20, -30-Math.random()*20, '#FFD600', 10, 0.8);
      }
    }
  }
}

function updateWeather(dt) {
  if (weatherState.type === 'fireRain') {
    weatherState.fireRainTimer -= dt;
    if (weatherState.fireRainTimer <= 0) {
      weatherState.fireRainTimer = 0.08 + Math.random() * 0.12;
      // Spawn fire rain particle in camera view
      const vw = GAME_W / WORLD_SCALE;
      const rx = cam.x + Math.random() * vw;
      const ry = cam.y - 20;
      const chars = ['火','焰','灼'];

    }
  }
  // Update fire rain particles
  let wi = 0;
  for (let i=0;i<weatherState.fireRainParticles.length;i++) {
    const p = weatherState.fireRainParticles[i];
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life > 0) weatherState.fireRainParticles[wi++] = p;
  }
  weatherState.fireRainParticles.length = wi;
}

let cutsceneState = null; // null or {phase, timer, totalTimer, ...}

function startFusionCutscene() {
  cutsceneState = {
    phase: 'darken', // darken, char1fly, char2fly, merge, flash, reveal, transition
    timer: 0,
    totalTimer: 0,
    char1: {c:'龙', x: GAME_W-80, y: 10, tx: GAME_W/2+20, ty: GAME_H/2-30, size: 24, alpha: 0},
    char2: {c:'魔', x: GAME_W-50, y: 10, tx: GAME_W/2-50, ty: GAME_H/2-30, size: 24, alpha: 0},
    mergedSize: 0,
    flashAlpha: 0,
    shakeIntensity: 0,
    crackLines: [],
    darkenAlpha: 0,
  };
  scene = 'cutscene_fusion';
}

function updateCutscene(dt) {
  if (!cutsceneState) return;
  const cs = cutsceneState;
  cs.timer += dt;
  cs.totalTimer += dt;

  switch(cs.phase) {
    case 'darken':
      cs.darkenAlpha = Math.min(0.85, cs.timer * 0.85);
      if (cs.timer >= 1.0) { cs.phase = 'char1fly'; cs.timer = 0; }
      break;
    case 'char1fly': {
      const t = Math.min(1, cs.timer / 1.2);
      const ease = t < 0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;
      cs.char1.alpha = Math.min(1, cs.timer * 2);
      cs.char1.x = cs.char1.x + (cs.char1.tx - cs.char1.x) * ease * 0.08;
      cs.char1.y = cs.char1.y + (cs.char1.ty - cs.char1.y) * ease * 0.08;
      cs.char1.size = 24 + t * 20;
      // Glow particles
      if (Math.random() < 0.3) addParticle('光', cs.char1.x+Math.random()*30, cs.char1.y+Math.random()*30, (Math.random()-0.5)*40, (Math.random()-0.5)*40, '#FF6D00', 8, 0.4);
      if (cs.timer >= 1.5) { cs.phase = 'char2fly'; cs.timer = 0; }
      break;
    }
    case 'char2fly': {
      const t = Math.min(1, cs.timer / 1.2);
      const ease = t < 0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;
      cs.char2.alpha = Math.min(1, cs.timer * 2);
      cs.char2.x = cs.char2.x + (cs.char2.tx - cs.char2.x) * ease * 0.08;
      cs.char2.y = cs.char2.y + (cs.char2.ty - cs.char2.y) * ease * 0.08;
      cs.char2.size = 24 + t * 20;
      // Continue moving char1 to final pos
      cs.char1.x += (cs.char1.tx - cs.char1.x) * 0.05;
      cs.char1.y += (cs.char1.ty - cs.char1.y) * 0.05;
      if (Math.random() < 0.3) addParticle('光', cs.char2.x+Math.random()*30, cs.char2.y+Math.random()*30, (Math.random()-0.5)*40, (Math.random()-0.5)*40, '#9C27B0', 8, 0.4);
      if (cs.timer >= 1.5) { cs.phase = 'merge'; cs.timer = 0; }
      break;
    }
    case 'merge': {
      const t = Math.min(1, cs.timer / 1.5);
      // Move both chars toward center
      const cx = GAME_W/2 - 15;
      const cy = GAME_H/2 - 30;
      cs.char1.x += (cx - cs.char1.x) * 0.1;
      cs.char1.y += (cy - cs.char1.y) * 0.1;
      cs.char2.x += (cx - cs.char2.x) * 0.1;
      cs.char2.y += (cy - cs.char2.y) * 0.1;
      cs.char1.size += (48 - cs.char1.size) * 0.05;
      cs.char2.size += (48 - cs.char2.size) * 0.05;
      // Rotation-like wobble via particles
      for (let i=0;i<2;i++) addParticle('光', cx+Math.random()*60-30, cy+Math.random()*60-30, (Math.random()-0.5)*80, (Math.random()-0.5)*80, Math.random()>0.5?'#FF3D00':'#9C27B0', 10, 0.5);
      cs.shakeIntensity = t * 6;
      if (cs.timer >= 1.5) { cs.phase = 'flash'; cs.timer = 0; }
      break;
    }
    case 'flash':
      cs.flashAlpha = 1 - cs.timer * 2;
      cs.shakeIntensity = (1 - cs.timer * 2) * 12;
      if (cs.timer >= 0.5) { cs.phase = 'reveal'; cs.timer = 0; cs.mergedSize = 0; }
      break;
    case 'reveal': {
      const t = Math.min(1, cs.timer / 1.5);
      cs.mergedSize = t * 72;
      cs.darkenAlpha = 0.85;
      // Epic particles
      if (Math.random() < 0.4) {
        const angle = Math.random() * Math.PI * 2;
        const spd = 60 + Math.random() * 100;
        addParticle('鳞', GAME_W/2+Math.cos(angle)*30, GAME_H/2-20+Math.sin(angle)*30, Math.cos(angle)*spd, Math.sin(angle)*spd, '#B71C1C', 12, 0.6);
      }
      if (cs.timer >= 1.5) { cs.phase = 'transition'; cs.timer = 0; }
      break;
    }
    case 'transition': {
      // Generate crack lines
      if (cs.crackLines.length < 15) {
        cs.crackLines.push({
          x: GAME_W/2 + (Math.random()-0.5)*40,
          y: GAME_H/2 + (Math.random()-0.5)*40,
          dx: (Math.random()-0.5) * GAME_W,
          dy: (Math.random()-0.5) * GAME_H,
          t: 0,
        });
      }
      for (const cl of cs.crackLines) cl.t = Math.min(1, cl.t + dt * 3);
      cs.flashAlpha = cs.timer / 1.0;
      if (cs.timer >= 1.0) {
        // End cutscene, proceed to level 18 (魔域边境)
        cutsceneState = null;
        particles.length = 0;
        startLevel(currentLevel + 1);
      }
      break;
    }
  }
}

function renderCutscene(ctx) {
  if (!cutsceneState) return;
  const cs = cutsceneState;

  // Dark background
  ctx.fillStyle = `rgba(0,0,0,${cs.darkenAlpha})`;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Shake offset
  const sx = (Math.random()-0.5) * cs.shakeIntensity;
  const sy = (Math.random()-0.5) * cs.shakeIntensity;
  ctx.save();
  ctx.translate(sx, sy);

  // Draw flying characters
  if (cs.phase !== 'reveal' && cs.phase !== 'transition') {
    if (cs.char1.alpha > 0) {
      atlas.draw(ctx, cs.char1.c, Math.round(cs.char1.size), '#FF6D00', cs.char1.x, cs.char1.y, cs.char1.alpha);
    }
    if (cs.char2.alpha > 0) {
      atlas.draw(ctx, cs.char2.c, Math.round(cs.char2.size), '#9C27B0', cs.char2.x, cs.char2.y, cs.char2.alpha);
    }
  }

  // Draw merged 魔龙
  if (cs.mergedSize > 0) {
    const msz = Math.round(cs.mergedSize);
    const mx = GAME_W/2 - msz * 0.55;
    const my = GAME_H/2 - msz * 0.5;
    atlas.draw(ctx, '魔', msz, '#B71C1C', mx, my);
    atlas.draw(ctx, '龙', msz, '#FF3D00', mx + msz * 0.9, my);
  }

  // Crack lines in transition phase
  if (cs.phase === 'transition') {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    for (const cl of cs.crackLines) {
      ctx.beginPath();
      ctx.moveTo(cl.x, cl.y);
      ctx.lineTo(cl.x + cl.dx * cl.t, cl.y + cl.dy * cl.t);
      ctx.stroke();
    }
  }

  ctx.restore();

  // Flash overlay
  if (cs.flashAlpha > 0) {
    ctx.fillStyle = `rgba(255,255,255,${Math.max(0, Math.min(1, cs.flashAlpha))})`;
    ctx.fillRect(0, 0, GAME_W, GAME_H);
  }

  // Render particles on top
  _renderPhase = true;
  renderParticles(ctx);
  _renderPhase = false;
  flushPendingParticles();
}

function recalcStats() {
  player.speed = player.shoes ? PLAYER_SPEED * 1.5 : PLAYER_SPEED;
  let dmg = 1, range = 25;
  if (player.weapon) {
    dmg = 2; range = 35;
    if (player.longWeapon) { dmg += 1; range = 55; }
    if (player.fireWeapon) dmg += 1;
    if (player.poisonWeapon) dmg += 1;
    if (player.frostWeapon) dmg += 1;
  }
  player.damage = dmg;
  player.attackRange = range;
  player.defense = 0;
}

const WEAPONS = new Set(['剑','枪']);
const MODIFIERS = new Set(['长','火','毒','霜']);

const HEAL_ITEMS = new Set(['果','肉','丹']);

function canEquip(item) {
  if (HEAL_ITEMS.has(item) && player.hp >= player.maxHp) return false;
  if (WEAPONS.has(item)) return true;
  if (MODIFIERS.has(item)) {
    if (!player.weapon) return false;
    if (item === '长' && player.longWeapon) return false;
    if (item === '火' && player.fireWeapon) return false;
    if (item === '毒' && player.poisonWeapon) return false;
    if (item === '霜' && player.frostWeapon) return false;
    return true;
  }
  return true;
}

function equipItem(item) {
  switch(item) {
    case '剑':
    case '枪':
      if (player.weapon) dropCurrentWeapon();
      player.weapon = item;
      break;
    case '长':
      if (player.weapon) player.longWeapon = true;
      break;
    case '火':
      if (player.weapon) player.fireWeapon = true;
      break;
    case '毒':
      if (player.weapon) player.poisonWeapon = true;
      break;
    case '霜':
      if (player.weapon) player.frostWeapon = true;
      break;
    case '血':
      player.maxHp += 1;
      player.hp = Math.min(player.hp+1, player.maxHp);
      addParticle('血', player.x, player.y-20, 0, -40, '#C62828', 18, 1.0);
      break;
    case '甲': player.armor = Math.min(player.armor + 2, 2); break;
    case '鞋': player.shoes = true; break;
    case '盔': player.helmet = true; break;  // NEW: helmet
    case '钥': player.hasKey = true; break;
    case '果':
      player.hp = Math.min(player.hp+1, player.maxHp);
      addParticle('愈', player.x, player.y-20, 0, -40, '#4CAF50', 16, 0.8);
      break;
    case '肉':
      player.hp = Math.min(player.hp+2, player.maxHp);
      addParticle('愈', player.x, player.y-20, 0, -40, '#4CAF50', 16, 0.8);
      break;
    case '丹':
      player.hp = player.maxHp;
      addParticle('愈', player.x, player.y-20, 0, -40, '#E040FB', 18, 1.0);
      break;
  }
  recalcStats();
}

function dropCurrentWeapon() {
  if (!player.weapon) return;
  spawnItem(player.weapon, player.x + player.facing * 20, player.y, true);
  if (player.fireWeapon) spawnItem('火', player.x + player.facing * 24, player.y - 10, true);
  if (player.poisonWeapon) spawnItem('毒', player.x + player.facing * 28, player.y - 20, true);
  if (player.longWeapon) spawnItem('长', player.x + player.facing * 32, player.y - 30, true);
  if (player.frostWeapon) spawnItem('霜', player.x + player.facing * 36, player.y - 40, true);
  player.weapon = null;
  player.fireWeapon = false;
  player.poisonWeapon = false;
  player.longWeapon = false;
  player.frostWeapon = false;
}

function getWeaponName() {
  if (!player.weapon) return '拳';
  let name = '';
  if (player.frostWeapon) name += '霜';
  if (player.fireWeapon) name += '火';
  if (player.poisonWeapon) name += '毒';
  if (player.longWeapon) name += '长';
  name += player.weapon;
  return name;
}

function playerUpdate(dt) {
  if (player.dead) return;
  player.animT += dt;
  player.attackTimer = Math.max(0, player.attackTimer - dt);
  player.attackCooldown = Math.max(0, player.attackCooldown - dt);
  player.hurtTimer = Math.max(0, player.hurtTimer - dt);
  player.dashCooldown = Math.max(0, player.dashCooldown - dt);

  // --- Attack hold tracking for plunge ---
  if (input.attack) player.attackHoldTime += dt;
  else player.attackHoldTime = 0;

  // --- Double-tap detection for dash ---
  const now = player.animT;
  if (input.left && !player.prevLeft) {
    if (now - player.lastTapLeft < DOUBLE_TAP_WINDOW && player.dashCooldown <= 0 && player.dashState === 'none' && player.plungeState === 'none') {
      player.dashState = 'dashing'; player.dashTimer = DASH_DURATION;
      player.dashDir = -1; player.dashCooldown = DASH_COOLDOWN;
      player.facing = -1;
      addParticle('冲', player.x+player.w/2, player.y+player.h/2, 60, 0, '#2196F3', 18, 0.3);
    }
    player.lastTapLeft = now;
  }
  if (input.right && !player.prevRight) {
    if (now - player.lastTapRight < DOUBLE_TAP_WINDOW && player.dashCooldown <= 0 && player.dashState === 'none' && player.plungeState === 'none') {
      player.dashState = 'dashing'; player.dashTimer = DASH_DURATION;
      player.dashDir = 1; player.dashCooldown = DASH_COOLDOWN;
      player.facing = 1;
      addParticle('冲', player.x+player.w/2, player.y+player.h/2, -60, 0, '#2196F3', 18, 0.3);
    }
    player.lastTapRight = now;
  }
  player.prevLeft = input.left;
  player.prevRight = input.right;

  // --- Plunge state machine ---
  if (player.plungeState === 'charging') {
    player.plungeTimer -= dt;
    player.vx *= 0.5;
    player.vy = 0;
    if (player.plungeTimer <= 0) {
      player.plungeState = 'plunging';
    }
  } else if (player.plungeState === 'plunging') {
    player.vy = PLUNGE_SPEED;
    player.vx = 0;
    if (Math.random() < 0.5) addParticle('坠', player.x+player.w/2, player.y-5, (Math.random()-0.5)*20, -40, '#FF8F00', 16, 0.25, 0);
    if (player.grounded && !player.plungeHitDone) {
      doPlungeLanding();
      player.plungeHitDone = true;
    }
  } else if (player.plungeState === 'landing') {
    player.plungeTimer -= dt;
    player.vx *= 0.3;
    if (player.plungeTimer <= 0) {
      player.plungeState = 'none';
      player.attackHoldTime = 0; // prevent immediate re-trigger
    }
  }
  // Trigger plunge: in air, holding attack, not dashing, and meaningfully airborne
  if (player.plungeState === 'none' && !player.grounded && player.coyoteTime <= 0 && player.attackHoldTime > PLUNGE_HOLD_THRESHOLD && player.dashState === 'none') {
    player.plungeState = 'charging';
    player.plungeTimer = 0.12;
    player.plungeHitDone = false;
    player.attackHoldTime = 0;
  }

  // --- Dash state machine ---
  if (player.dashState === 'dashing') {
    player.dashTimer -= dt;
    player.vx = DASH_SPEED * player.dashDir;
    player.vy = 0; // no gravity during dash
    // Dash trail
    if (Math.random() < 0.6) addParticle('冲', player.x+player.w/2 - player.dashDir*20, player.y+player.h/2, -player.dashDir*30, (Math.random()-0.5)*20, '#90CAF9', 14, 0.2, 0);
    // Dash attack if attack pressed during dash
    if (input.attackPressed && player.attackCooldown <= 0) {
      doDashAttack();
    }
    if (player.dashTimer <= 0) {
      player.dashState = 'none';
      player.vx = player.dashDir * player.speed * 0.5; // decelerate after dash
    }
  }

  // Coyote time
  if (player.grounded) player.coyoteTime = 0.1;
  else player.coyoteTime = Math.max(0, (player.coyoteTime||0) - dt);

  // Jump buffer
  if (input.jumpPressed) input.jumpBuffer = 0.12;
  else input.jumpBuffer = Math.max(0, input.jumpBuffer - dt);

  // Check if on ladder/vine
  const pcx = Math.floor((player.x+player.w/2)/TILE);
  const pcy = Math.floor((player.y+player.h/2)/TILE);
  const tileAtPlayer = getTile(pcx, pcy);
  const onLadder = tileAtPlayer && tileAtPlayer.climbable;

  // Reset per-frame hazard states
  player.onIce = false;
  player.mudSlow = 0;
  player.windForce = 0;

  // Check hazards at player position
  const hazardTile = tileAtPlayer;
  if (hazardTile) {
    if (hazardTile.hazard === 'mud') player.mudSlow = 0.35;
    if (hazardTile.hazard === 'wind') player.windForce = 360;
    if (hazardTile.hazard === 'fog') player.fogTimer = 2.4;
    if (hazardTile.hazard === 'vine') player.mudSlow = 0.7; // vine slightly slows
    if (hazardTile.hazard === 'swamp') {
      player.mudSlow = 0.3;
      player.poisonTimer += dt;
      if (player.poisonTimer > 0.8) {
        hurtPlayer(1);
        player.poisonTimer = 0;
        addParticle('毒', player.x+player.w/2, player.y, 0, -30, '#4CAF50', 14, 0.5);
      }
    }
  } else {
    player.poisonTimer = Math.max(0, player.poisonTimer - dt*2);
  }

  // Fog timer: decays so fog effect persists after contact (reduced 40%)
  if (player.fogTimer > 0) {
    player.fogTimer -= dt * 0.8;
    player.inFog = true;
  } else {
    player.inFog = false;
  }

  // Check surface below (ice, bounce)
  const surf = getSurfaceBelow(player);
  if (surf === 'ice' && player.grounded) player.onIce = true;
  if (surf === 'bounce' && player.grounded) {
    player.vy = PLAYER_JUMP * 1.6; // super bounce
    player.grounded = false;
    addParticle('弹', player.x+player.w/2, player.y+player.h, 0, 10, '#FF6F00', 16, 0.3);
    cam.shake(3, 0.1);
  }

  // Effective speed with mud/ice
  let effectiveSpeed = player.speed;
  if (player.mudSlow > 0) effectiveSpeed *= player.mudSlow;

  // Movement (skip during dash/plunge)
  const normalMove = player.dashState === 'none' && player.plungeState === 'none';
  if (normalMove) {
  if (player.onIce) {
    // Ice: very slippery - minimal control, nearly no friction (2x enhanced)
    if (input.left) { player.vx -= effectiveSpeed * dt * 1.25; player.facing = -1; }
    else if (input.right) { player.vx += effectiveSpeed * dt * 1.25; player.facing = 1; }
    else { player.vx *= 0.9996; } // nearly zero friction on ice
    // Allow much higher speed on ice for dramatic sliding
    if (Math.abs(player.vx) > effectiveSpeed * 2.2) player.vx = Math.sign(player.vx) * effectiveSpeed * 2.2;
  } else {
    if (input.left) { player.vx = -effectiveSpeed; player.facing = -1; }
    else if (input.right) { player.vx = effectiveSpeed; player.facing = 1; }
    else { player.vx *= FRICTION; if (Math.abs(player.vx) < 5) player.vx = 0; }
  }

  // Wind push
  if (player.windForce !== 0) {
    player.vx += player.windForce * dt;
  }
  } // end normalMove

  // Ladder climbing (skip during dash/plunge)
  if (normalMove) {
  if (onLadder) {
    if (input.jump) {
      player.vy = -120;
    } else {
      player.vy = 30;
    }
    player.grounded = true;
  } else {
    // Jump
    if (input.jumpBuffer > 0 && (player.grounded || player.coyoteTime > 0)) {
      player.vy = PLAYER_JUMP;
      player.grounded = false;
      player.coyoteTime = 0;
      input.jumpBuffer = 0;
    }
    // Gravity
    player.vy += GRAVITY * dt;
    if (player.vy > MAX_FALL) player.vy = MAX_FALL;
  }
  } // end normalMove for gravity

  // Move X
  player.x += player.vx * dt;
  resolveCollisionX(player);

  // Move Y
  player.y += player.vy * dt;
  player.grounded = false;
  resolveCollisionY(player);

  // World bounds
  if (player.x < 0) player.x = 0;
  if (player.x > levelW*TILE - player.w) player.x = levelW*TILE - player.w;

  // Hazards (damage/slow from old tiles)
  const cx = Math.floor((player.x+player.w/2)/TILE);
  const cy = Math.floor((player.y+player.h/2)/TILE);
  const tile = getTile(cx,cy);
  if (tile && tile.hazard === 'damage') hurtPlayer(1);
  if (tile && tile.hazard === 'lava') { 
    hurtPlayer(1); 
    addParticle('烫', player.x+player.w/2, player.y-8, (Math.random()-0.5)*30, -40, '#FF6D00', 14, 0.4); 
  }
  if (tile && tile.hazard === 'slow') player.vx *= 0.5;

  // Fall death
  if (player.y > levelH * TILE + 100) {
    if (godMode) { player.y = 0; player.vy = 0; }
    else { player.hp = 0; player.dead = true; }
  }
}

function resolveCollisionX(ent) {
  const left = Math.floor(ent.x/TILE);
  const right = Math.floor((ent.x+ent.w-1)/TILE);
  const top = Math.floor(ent.y/TILE);
  const bot = Math.floor((ent.y+ent.h-1)/TILE);
  for (let y=top;y<=bot;y++) {
    for (let x=left;x<=right;x++) {
      if (isSolid(x,y)) {
        if (ent.vx > 0) { ent.x = x*TILE - ent.w; ent.vx = 0; }
        else if (ent.vx < 0) { ent.x = (x+1)*TILE; ent.vx = 0; }
      }
    }
  }
}

function resolveCollisionY(ent) {
  const left = Math.floor(ent.x/TILE);
  const right = Math.floor((ent.x+ent.w-1)/TILE);
  const top = Math.floor(ent.y/TILE);
  const bot = Math.floor((ent.y+ent.h-1)/TILE);
  for (let y=top;y<=bot;y++) {
    for (let x=left;x<=right;x++) {
      const solid = isSolid(x,y);
      const plat = isPlatform(x,y);
      if (solid) {
        if (ent.vy > 0) { ent.y = y*TILE - ent.h; ent.vy = 0; ent.grounded = true; }
        else if (ent.vy < 0) { ent.y = (y+1)*TILE; ent.vy = 0; }
      } else if (plat && ent.vy >= 0) {
        const entBot = ent.y + ent.h;
        const platTop = y * TILE;
        if (entBot > platTop && entBot <= platTop + ent.vy * 0.05 + 10) {
          ent.y = platTop - ent.h;
          ent.vy = 0;
          ent.grounded = true;
        }
      }
    }
  }
}

function hurtPlayer(dmg) {
  if (godMode) return;
  if (player.hurtTimer > 0 || player.dead) return;
  let actual = Math.max(1, dmg);
  // Helmet absorbs hit first (before armor)
  if (player.helmet) {
    player.helmet = false;
    addParticle('盔', player.x+player.w/2, player.y-10, (Math.random()-0.5)*40, -60, '#FF8F00', 16, 0.5, 0);
    player.hurtTimer = 2.0;
    cam.shake(3, 0.1);
    return; // helmet absorbed the hit
  }
  // Armor absorbs damage next
  if (player.armor > 0) {
    player.armor -= 1;
    addParticle('甲', player.x+player.w/2, player.y-10, (Math.random()-0.5)*40, -60, '#FFD600', 16, 0.5, 0);
    player.hurtTimer = 2.0;
    cam.shake(3, 0.1);
    recalcStats();
    return; // armor absorbed the hit
  }
  player.hp -= actual;
  player.hurtTimer = 2.0;
  cam.shake(4, 0.15);
  addParticle('痛', player.x+player.w/2, player.y, (Math.random()-0.5)*60, -80, '#F44336', 18, 0.6, 100);
  if (player.hp <= 0) { player.hp = 0; player.dead = true; }
}

function doPlayerAttack() {
  const f = player.facing;
  let ax, ay, aw, ah, dmg = player.damage;

  if (player.weapon === '剑') {
    const range = player.attackRange;
    ax = f > 0 ? player.x + player.w : player.x - range;
    ay = player.y - 8;
    aw = range;
    ah = player.h + 16;
    const px = f > 0 ? player.x + player.w + 14 : player.x - 24;
    addParticle('斩', px, player.y - 4, f*100, -50, '#FFD600', 20, 0.3, 0);
    addParticle('斩', px, player.y + 20, f*120, 30, '#FFD600', 18, 0.25, 0);
  } else if (player.weapon === '枪') {
    const range = player.attackRange + 10;
    ax = f > 0 ? player.x + player.w : player.x - range;
    ay = player.y + 8;
    aw = range;
    ah = player.h - 16;
    const px = f > 0 ? player.x + player.w + 15 : player.x - 25;
    addParticle('刺', px, player.y+player.h/2-5, f*160, 0, '#607D8B', 18, 0.25, 0);
    player.vx += f * 80;
  } else {
    ax = f > 0 ? player.x + player.w : player.x - player.attackRange;
    ay = player.y;
    aw = player.attackRange;
    ah = player.h;
  }

  for (const m of monsters) {
    if (m.dead) continue;
    if (aabbHit(ax,ay,aw,ah, m.x,m.y,m.w,m.h)) {
      hurtMonster(m, dmg);
    }
  }
  checkAttackInteract(ax,ay,aw,ah);
}

function aabbHit(ax,ay,aw,ah,bx,by,bw,bh) {
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

function doDashAttack() {
  const f = player.dashDir;
  player.facing = f;
  const range = Math.round(player.attackRange * DASH_ATK_RANGE_MULT);
  const dmg = Math.ceil(player.damage * DASH_ATK_DMG_MULT);
  let ax, ay, aw, ah;
  const px = f > 0 ? player.x + player.w + 10 : player.x - 20;

  if (player.weapon === '剑') {
    ax = f > 0 ? player.x + player.w - 10 : player.x - range + 10;
    ay = player.y - 20;
    aw = range;
    ah = player.h + 40;
    for (let i = 0; i < 3; i++) {
      addParticle('斩', px + f*i*12, player.y - 10 + i*15, f*150, (i-1)*40, '#FFD600', 22, 0.35, 0);
    }
  } else if (player.weapon === '枪') {
    const pierceRange = range + 20;
    ax = f > 0 ? player.x + player.w : player.x - pierceRange;
    ay = player.y + 5;
    aw = pierceRange;
    ah = player.h - 10;
    addParticle('刺', px, player.y+player.h/2, f*200, 0, '#607D8B', 20, 0.3, 0);
    addParticle('冲', px + f*15, player.y+player.h/2-5, f*180, 0, '#90CAF9', 18, 0.25, 0);
    player.vx += f * 120;
  } else {
    ax = f > 0 ? player.x + player.w : player.x - range;
    ay = player.y - 5;
    aw = range;
    ah = player.h + 10;
  }

  for (const m of monsters) {
    if (m.dead) continue;
    if (aabbHit(ax,ay,aw,ah, m.x,m.y,m.w,m.h)) hurtMonster(m, dmg);
  }
  checkAttackInteract(ax,ay,aw,ah);
  player.attackTimer = 0.25;
  player.attackCooldown = 0.4;
  player.dashState = 'none';
  player.dashTimer = 0;
  cam.shake(5, 0.15);
}

function doPlungeLanding() {
  const cx = player.x + player.w/2;
  const cy = player.y + player.h;
  const range = 60;
  const dmg = Math.ceil(player.damage * 2);
  for (const m of monsters) {
    if (m.dead) continue;
    const mx = m.x + m.w/2, my = m.y + m.h/2;
    if (Math.abs(mx-cx) < range && Math.abs(my-cy) < range) {
      hurtMonster(m, dmg);
    }
  }
  // Break nearby breakable tiles (砖, 草, 叶, 云, 灯, 窗, 骨, 灰, 箱)
  checkAttackInteract(cx - range, cy - range, range*2, range*2);
  for (let i = 0; i < 6; i++) {
    const ang = i/6 * Math.PI * 2;
    addParticle('震', cx, cy, Math.cos(ang)*80, Math.sin(ang)*60-30, '#FF8F00', 18, 0.4, 100);
  }
  addParticle('坠', cx, cy-10, 0, -50, '#FF8F00', 22, 0.5, 0);
  cam.shake(6, 0.2);
  player.plungeState = 'landing';
  player.plungeTimer = 0.2;
}

function renderPlayer(ctx) {
  if (player.dead) return;
  const ox = player.x - cam.x + cam.shakeX;
  const oy = player.y - cam.y + cam.shakeY;
  const s = SCALE;
  const flash = player.hurtTimer > 0 && Math.floor(player.hurtTimer*10)%2===0;
  const fc = flash ? '#F44336' : null;
  const f = player.facing;
  const moving = Math.abs(player.vx) > 40;
  const bob = moving ? Math.sin(player.animT*8)*2 : 0;
  const legOff = moving ? Math.sin(player.animT*10)*3 : 0;
  const atkOff = player.attackTimer > 0 ? 12*f : 0;
  const cx = ox + player.w/2;
  const cy = oy;
  const sz = 13;
  const headSz = 16;

  let hurtScale = 1;
  if (player.hurtTimer > 0) {
    hurtScale = 1 - 0.25 * Math.abs(Math.sin(player.hurtTimer * 12));
  }
  const hurtAlpha = (player.hurtTimer > 0 && Math.floor(player.hurtTimer * 8) % 2 === 0) ? 0.3 : 1;

  // --- Dash afterimage effect ---
  if (player.dashState === 'dashing') {
    for (let gi = 2; gi >= 1; gi--) {
      const ga = 0.15 / gi;
      const gx = ox - player.dashDir * gi * 14;
      const gy = oy;
      const gcx = gx + player.w/2;
      ctx.globalAlpha = ga;
      atlas.draw(ctx,'头',headSz,'#90CAF9', gcx-headSz/2, gy);
      atlas.draw(ctx,'身',sz,'#90CAF9', gcx-sz/2, gy+headSz);
      atlas.draw(ctx,'体',sz,'#90CAF9', gcx-sz/2, gy+headSz+sz);
      ctx.globalAlpha = 1;
    }
  }

  // --- Plunge visual effect ---
  if (player.plungeState === 'plunging') {
    ctx.globalAlpha = 0.4;
    atlas.draw(ctx,'坠',20,'#FF8F00', cx-10, oy+player.h);
    ctx.globalAlpha = 1;
  }
  if (player.plungeState === 'landing') {
    const t = 1 - player.plungeTimer / 0.2;
    const ringR = 20 + t * 40;
    ctx.strokeStyle = '#FF8F00';
    ctx.lineWidth = 3 - t * 2;
    ctx.globalAlpha = 1 - t;
    ctx.beginPath();
    ctx.ellipse(cx, oy+player.h, ringR, ringR*0.4, 0, 0, Math.PI*2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Head (盔 replaces 头 when helmet is equipped)
  const headChar = player.helmet ? '盔' : '头';
  const headCol = player.helmet ? (fc||'#FF8F00') : (fc||'#4E342E');
  const headX = cx - headSz/2;
  const headY = cy + bob;
  if (hurtScale < 1) {
    ctx.save();
    ctx.translate(headX + headSz/2, headY + headSz/2);
    ctx.scale(hurtScale, hurtScale);
    ctx.globalAlpha = hurtAlpha;
    atlas.draw(ctx,headChar,headSz,headCol, -headSz/2, -headSz/2);
    ctx.restore();
  } else {
    atlas.draw(ctx,headChar,headSz,headCol, headX, headY);
  }

  const bodyY = cy + headSz + bob;

  // Body
  const topChar = player.armor >= 2 ? '甲' : (player.armor === 1 ? '甲' : '身');
  const topCol = player.armor >= 2 ? '#FFD600' : (player.armor === 1 ? '#FFD600' : '#1565C0');
  const botChar = player.armor >= 2 ? '甲' : '体';
  const botCol = player.armor >= 2 ? '#FFD600' : '#1565C0';
  if (hurtScale < 1) {
    ctx.save();
    ctx.translate(cx, bodyY + sz);
    ctx.scale(hurtScale, hurtScale);
    ctx.globalAlpha = hurtAlpha;
    atlas.draw(ctx, topChar, sz, fc||topCol, -sz/2, -sz);
    atlas.draw(ctx, botChar, sz, fc||botCol, -sz/2, 0);
    ctx.restore();
  } else {
    atlas.draw(ctx, topChar, sz, fc||topCol, cx-sz/2, bodyY);
    atlas.draw(ctx, botChar, sz, fc||botCol, cx-sz/2, bodyY+sz);
  }

  // Hands
  atlas.draw(ctx,'手',sz,fc||'#4E342E', cx-sz/2-sz, bodyY, hurtAlpha);
  atlas.draw(ctx,'手',sz,fc||'#4E342E', cx+sz/2, bodyY, hurtAlpha);

  // Weapon
  if (player.weapon) {
    const wChars = [];
    if (player.frostWeapon) wChars.push({c:'霜',col:'#4FC3F7'});
    if (player.fireWeapon) wChars.push({c:'火',col:'#FF5722'});
    if (player.poisonWeapon) wChars.push({c:'毒',col:'#4CAF50'});
    if (player.longWeapon) wChars.push({c:'长',col:'#9E9E9E'});
    const baseCol = player.frostWeapon?'#4FC3F7':player.fireWeapon?'#FF5722':player.poisonWeapon?'#4CAF50':'#B0BEC5';
    wChars.push({c:player.weapon, col:baseCol});

    const isSword = player.weapon === '剑';
    const isSpear = player.weapon === '枪';
    const attacking = player.attackTimer > 0;
    const pivotX = f===1 ? cx+sz/2+sz : cx-sz/2-sz;
    const pivotY = bodyY + sz/2;

    if (isSword) {
      let angle;
      if (attacking) {
        const t = 1 - player.attackTimer / 0.2;
        angle = f * (-1.05 + t * 1.6);
      } else {
        angle = f * (-1.05);
      }
      ctx.save();
      ctx.translate(pivotX, pivotY);
      ctx.rotate(angle);
      for (let wi=0; wi<wChars.length; wi++) {
        const wx = f===1 ? wi*sz : -(wi+1)*sz;
        atlas.draw(ctx, wChars[wi].c, sz, fc||wChars[wi].col, wx, -sz/2, hurtAlpha);
      }
      ctx.restore();
    } else if (isSpear) {
      let angle = 0;
      let thrustOff = 0;
      if (attacking) {
        const t = 1 - player.attackTimer / 0.2;
        angle = f * (0.5 - t * 0.85);
        thrustOff = f * Math.sin(t * Math.PI) * 8;
      }
      ctx.save();
      ctx.translate(pivotX + thrustOff, pivotY);
      ctx.rotate(angle);
      for (let wi=0; wi<wChars.length; wi++) {
        const wx = f===1 ? wi*sz : -(wi+1)*sz;
        atlas.draw(ctx, wChars[wi].c, sz, fc||wChars[wi].col, wx, -sz/2, hurtAlpha);
      }
      ctx.restore();
    } else {
      if (f===1) {
        for (let wi=0; wi<wChars.length; wi++) {
          atlas.draw(ctx, wChars[wi].c, sz, fc||wChars[wi].col, cx+sz/2+sz+wi*sz+atkOff, bodyY, hurtAlpha);
        }
      } else {
        for (let wi=0; wi<wChars.length; wi++) {
          atlas.draw(ctx, wChars[wi].c, sz, fc||wChars[wi].col, cx-sz/2-sz-(wi+1)*sz+atkOff, bodyY, hurtAlpha);
        }
      }
    }
  }

  // Feet
  const footY = bodyY + sz*2;
  const footChar = player.shoes ? '鞋' : '脚';
  const footCol = player.shoes ? '#E91E63' : '#4E342E';
  atlas.draw(ctx, footChar, sz, fc||footCol, cx-sz+legOff, footY, hurtAlpha);
  atlas.draw(ctx, footChar, sz, fc||footCol, cx-legOff, footY, hurtAlpha);
}

function updateMonster(m, dt) {
  if (m.dead) {
    m.deathTimer -= dt;
    return;
  }
  m.hurtTimer = Math.max(0, m.hurtTimer-dt);
  m.attackTimer = Math.max(0, m.attackTimer-dt);
  m.burning = Math.max(0, m.burning-dt);
  m.poisoned = Math.max(0, m.poisoned-dt);
  m.stunned = Math.max(0, m.stunned-dt);

  if (m.burning > 0 && Math.random()<0.02) {
    addParticle('燃', m.x+Math.random()*m.w, m.y, (Math.random()-0.5)*30, -40, '#FF5722', 12, 0.5);
  }
  if (m.poisoned > 0 && Math.random()<0.02) {
    addParticle('毒', m.x+Math.random()*m.w, m.y, (Math.random()-0.5)*30, -40, '#4CAF50', 12, 0.5);
  }
  if (m.stunned > 0) {
    addParticle('冻', m.x+m.w/2+Math.sin(Date.now()*0.01)*10, m.y-12, 0, 0, '#4FC3F7', 10, 0.1);
    return;
  }

  const dist = Math.abs(m.x - player.x);
  if (dist > GAME_W * 1.5) return;
  m.activated = true;

  m.aiTimer += dt;
  switch(m.type) {
    case '魔': aiPatrol(m, dt, 80, 80); break;
    case '野猪': aiCharge(m, dt); break;
    case '毒蛛': aiSpiderRanged(m, dt); break;
    case '蝙蝠': aiFly(m, dt); break;
    case '火法师': aiRanged(m, dt, '火球', '#FF5722'); break;
    case '骷髅': aiSkeletonRanged(m, dt); break;
    case '巨石人': aiSlow(m, dt); break;
    case '影': aiShadow(m, dt); break;
    case '鬼将': aiGhostGeneral(m, dt); break;  
    case '火龙': aiFireDragonBoss(m, dt); break;
    case '魔王': aiBoss(m, dt); break;
    case '魔龙': aiDragonBoss(m, dt); break;
    case '长蛇': aiSnake(m, dt); break;
    case '树妖': aiTreeSpirit(m, dt); break;
    case '冰灵': aiIceSpirit(m, dt); break;
    case '刺客': aiAssassin(m, dt); break;
    case '雷兽': aiThunderBeast(m, dt); break;
    case '熔炎魔': aiLavaDemon(m, dt); break;
    case '冥蟒': aiAbyssSerpent(m, dt); break;
    case '古傀儡': aiAncientGolem(m, dt); break;
    default: aiPatrol(m, dt, 80, 80);
  }

  // Gravity for grounded types
  if (m.type !== '蝙蝠' && m.type !== '火龙' && !m.noCollision && !(m.type==='魔龙'&&m.dragonFlying)) {
    m.vy += GRAVITY * dt;
    if (m.vy > MAX_FALL) m.vy = MAX_FALL;
  }
  m.x += m.vx * dt;
  if (!m.noCollision) resolveCollisionX(m);
  m.y += m.vy * dt;
  m.grounded = false;
  if (!m.noCollision) resolveCollisionY(m);

  // Safety: kill monsters that go out of bounds or have NaN positions
  if (isNaN(m.x)||isNaN(m.y)||m.x<-200||m.x>levelW*TILE+200||m.y>levelH*TILE+200) {
    m.dead=true; m.deathTimer=0; return;
  }

  // Contact damage
  if (!player.dead && player.hurtTimer <= 0 && aabbHit(m.x,m.y,m.w,m.h, player.x,player.y,player.w,player.h)) {
    hurtPlayer(1);
  }
}

// AI behaviors
function aiPatrol(m, dt, speed, maxD) {
  m.patrolDist += Math.abs(m.vx*dt);
  if (m.patrolDist > maxD) { m.patrolDir *= -1; m.patrolDist = 0; }
  m.vx = speed * m.patrolDir;
  m.facing = m.patrolDir;
}

function aiCharge(m, dt) {
  const dx = player.x - m.x;
  const dist = Math.abs(dx);
  const inRange = dist < 200 && Math.abs(player.y - m.y) < 50;
  if (!m.chargeState) m.chargeState = 'idle';
  if (!m.chargeTimer) m.chargeTimer = 0;
  m.chargeTimer -= dt;

  switch (m.chargeState) {
    case 'idle':
      if (inRange) {
        m.chargeState = 'charge';
        m.chargeFacing = dx > 0 ? 1 : -1;
        m.chargeTimer = 0.8;
      } else {
        aiPatrol(m, dt, 60, 80);
      }
      break;
    case 'charge':
      m.vx = m.chargeFacing * (m.speed || 250);
      m.facing = m.chargeFacing;
      if (m.chargeTimer <= 0 || (dist < 20 && inRange)) {
        m.chargeState = 'retreat';
        m.chargeTimer = 0.5;
      }
      break;
    case 'retreat':
      m.vx = -m.chargeFacing * (m.speed || 250) * 0.6;
      m.facing = m.chargeFacing;
      if (m.chargeTimer <= 0) {
        m.chargeState = 'charge';
        m.chargeFacing = (player.x - m.x) > 0 ? 1 : -1;
        m.chargeTimer = 0.8;
      }
      break;
  }
  if (!inRange && dist > 250 && m.chargeState !== 'idle') {
    m.chargeState = 'idle';
    m.chargeTimer = 0;
  }
}

function aiDropAttack(m, dt) {
  if (m.aiState === 'idle') {
    m.vx = 0;
    if (Math.abs(player.x-m.x)<40 && player.y > m.y) { m.aiState='drop'; m.vy=0; }
  } else if (m.aiState === 'drop') {
    m.vy = 150;
    if (m.grounded) { m.aiState='crawl'; m.aiTimer=0; }
  } else {
    aiPatrol(m, dt, 50, 60);
    if (m.aiTimer > 3) { m.aiState='idle'; m.aiTimer=0; }
  }
}

// Spider AI: patrols and spits poison webs
function aiSpiderRanged(m, dt) {
  aiPatrol(m, dt, 50, 60);
  const dx = player.x - m.x;
  m.facing = dx > 0 ? 1 : -1;
  m.projTimer = (m.projTimer || 2) - dt;
  if (m.projTimer <= 0 && Math.abs(dx) < 200) {
    m.projTimer = 2.2;
    // Spit poison web in arc toward player
    const dist = Math.abs(dx);
    const throwVx = m.facing * (60 + Math.min(dist * 0.4, 100));
    const throwVy = -120 - Math.random() * 30;
    spawnArcProjectile(m.x + m.w/2, m.y + 4, throwVx, throwVy, '毒', '#4CAF50', 1);
    addParticle('丝', m.x + m.w/2, m.y, m.facing * 10, -20, '#8BC34A', 10, 0.3);
  }
}

// FIXED: Bat AI - store initial Y on creation, use stable patrol
function aiFly(m, dt) {
  // Use the stored flyInitY which is set at creation time
  const homeY = m.flyInitY;
  if (!m.flyDir) m.flyDir = 1;
  if (!m.flyDist) m.flyDist = 0;
  const maxFlyDist = 100;
  const flySpeed = 50;

  // Horizontal patrol
  m.flyDist += flySpeed * dt;
  if (m.flyDist > maxFlyDist) {
    m.flyDir *= -1;
    m.flyDist = 0;
  }
  m.vx = flySpeed * m.flyDir;
  m.facing = m.flyDir;

  // Gentle vertical bobbing around home Y (stable, no drift)
  m.y = homeY + Math.sin(m.aiTimer * 1.5) * (m.flyAmp || 25);
  m.vy = 0;

  // If player is close, drift toward them slowly
  const dx = player.x - m.x;
  if (Math.abs(dx) < 120 && Math.abs(player.y - m.y) < 80) {
    m.vx = (dx > 0 ? 1 : -1) * 70;
    m.facing = dx > 0 ? 1 : -1;
  }
}

function aiRanged(m, dt, projChar, projCol) {
  m.vx = 0;
  const dx = player.x - m.x;
  m.facing = dx > 0 ? 1 : -1;
  m.projTimer = (m.projTimer||0) - dt;
  if (m.projTimer <= 0 && Math.abs(dx) < 250) {
    m.projTimer = 2;
    spawnProjectile(m.x+m.w/2, m.y+m.h/2, m.facing*180, 0, projChar, projCol, 1);
  }
}

// Skeleton: throws bones in parabolic arc
function aiSkeletonRanged(m, dt) {
  m.vx = 0;
  const dx = player.x - m.x;
  m.facing = dx > 0 ? 1 : -1;
  m.projTimer = (m.projTimer||0) - dt;
  if (m.projTimer <= 0 && Math.abs(dx) < 280) {
    m.projTimer = 2.2;
    // Calculate arc: throw bone upward so it arcs down toward player
    const throwVx = m.facing * (80 + Math.min(Math.abs(dx)*0.4, 120));
    const throwVy = -180 - Math.random()*40;
    spawnArcProjectile(m.x+m.w/2, m.y+8, throwVx, throwVy, '骨', '#ECEFF1', 1);
  }
}

// Arc projectile: affected by gravity
function spawnArcProjectile(x,y,vx,vy,c,col,dmg) {
  if (projectiles.length > 80) projectiles.splice(0, 20);
  projectiles.push({x,y,vx,vy,c,col,dmg,w:12,h:12,life:3,fromPlayer:false,hasGravity:true});
}

// Snake AI: slithers on ground, lunges at player
function aiSnake(m, dt) {
  const dx = player.x - m.x;
  const dist = Math.abs(dx);
  const dy = Math.abs(player.y - m.y);
  m.facing = dx>0?1:-1;

  if (!m.snakeState) m.snakeState = 'slither';
  if (!m.snakeTimer) m.snakeTimer = 0;
  m.snakeTimer -= dt;

  switch(m.snakeState) {
    case 'slither':
      // Wavy movement toward player
      m.vx = m.facing * 70;
      if (dist < 50 && dy < 30) {
        m.snakeState = 'coil';
        m.snakeTimer = 0.4;
        m.vx = 0;
      }
      if (dist > 200) {
        aiPatrol(m, dt, 50, 80);
      }
      break;
    case 'coil':
      m.vx = 0;
      if (m.snakeTimer <= 0) {
        m.snakeState = 'lunge';
        m.snakeTimer = 0.2;
        m.vx = m.facing * 300;
        m.vy = -80;
      }
      break;
    case 'lunge':
      if (!player.dead && aabbHit(m.x,m.y,m.w,m.h,player.x,player.y,player.w,player.h)) {
        hurtPlayer(1);
      }
      if (m.snakeTimer <= 0 || m.grounded) {
        m.snakeState = 'rest';
        m.snakeTimer = 0.8;
        m.vx = 0;
      }
      break;
    case 'rest':
      m.vx *= 0.9;
      if (m.snakeTimer <= 0) {
        m.snakeState = 'slither';
      }
      break;
  }
}

// Tree Spirit: stationary, spawns leaf projectiles in pattern
function aiTreeSpirit(m, dt) {
  m.vx = 0;
  const dx = player.x - m.x;
  m.facing = dx > 0 ? 1 : -1;
  m.projTimer = (m.projTimer||0) - dt;
  if (m.projTimer <= 0 && Math.abs(dx) < 220) {
    m.projTimer = 2.5;
    const dist = Math.abs(dx);
    // Arc toward player: horizontal speed scales with distance, upward launch with gravity
    for (let i = -1; i <= 1; i++) {
      const throwVx = m.facing * (50 + Math.min(dist * 0.5, 120)) + i * 20;
      const throwVy = -140 - Math.random() * 30;
      projectiles.push({x: m.x+m.w/2, y: m.y+10, vx: throwVx, vy: throwVy, c:'叶', col:'#4CAF50', dmg:1, w:12, h:12, life:2.5, fromPlayer:false, hasGravity:true});
    }
    addParticle('叶', m.x+m.w/2, m.y, 0, -30, '#4CAF50', 14, 0.4);
  }
}

// Ice Spirit: floats, creates ice hazard, fires ice shards
function aiIceSpirit(m, dt) {
  const homeY = m.flyInitY || m.y;
  m.y = homeY + Math.sin(m.aiTimer * 2) * 20;
  m.vy = 0;
  const dx = player.x - m.x;
  m.facing = dx > 0 ? 1 : -1;
  // Gentle drift
  m.vx = Math.sin(m.aiTimer * 0.8) * 40;
  m.projTimer = (m.projTimer||0) - dt;
  if (m.projTimer <= 0 && Math.abs(dx) < 200) {
    m.projTimer = 1.8;
    // Ice shard - faster, straight line
    spawnProjectile(m.x+m.w/2, m.y+m.h/2, m.facing * 200, 0, '冰', '#4FC3F7', 1);
    addParticle('冰', m.x+m.w/2, m.y+m.h/2, m.facing*10, 0, '#B3E5FC', 10, 0.3);
  }
}

// Assassin: invisible until close, backstab attack
function aiAssassin(m, dt) {
  const dx = player.x - m.x;
  const dist = Math.abs(dx);
  const dy = Math.abs(player.y - m.y);
  m.facing = dx>0?1:-1;

  if (!m.assState) m.assState = 'hide';
  if (!m.assTimer) m.assTimer = 0;
  m.assTimer -= dt;
  // visibility for rendering
  m.assVisible = m.assState !== 'hide';

  switch(m.assState) {
    case 'hide':
      m.vx = 0;
      // Approach slowly when far, invisible
      if (dist > 60) {
        m.vx = m.facing * 30;
      }
      // Strike when close
      if (dist < 50 && dy < 40) {
        m.assState = 'strike';
        m.assTimer = 0.15;
        m.vx = m.facing * 280;
        addParticle('闪', m.x+m.w/2, m.y+m.h/2, 0, -20, '#3F51B5', 16, 0.3);
      }
      break;
    case 'strike':
      if (!player.dead && aabbHit(m.x,m.y,m.w,m.h,player.x,player.y,player.w,player.h)) {
        hurtPlayer(2);
        cam.shake(4, 0.15);
      }
      if (m.assTimer <= 0) {
        m.assState = 'flee';
        m.assTimer = 1.0;
        m.vx = -m.facing * 180;
      }
      break;
    case 'flee':
      if (m.assTimer <= 0) {
        m.assState = 'hide';
        m.assTimer = 2.0;
      }
      m.vx *= 0.95;
      break;
  }
}

// =============================================================
// LARGE ELITE MONSTERS
// =============================================================

// Thunder Beast: charge with lightning trail + AoE stomp + chain lightning
function aiThunderBeast(m, dt) {
  const dx = player.x - m.x;
  const dist = Math.abs(dx);
  const dy = Math.abs(player.y - m.y);
  m.facing = dx>0?1:-1;

  if (!m.tbState) m.tbState = 'prowl';
  if (m.tbTimer === undefined) m.tbTimer = 1.5;
  m.tbTimer -= dt;

  switch(m.tbState) {
    case 'prowl':
      // Slow menacing walk toward player
      if (dist > 40) m.vx = m.facing * (m.speed||60);
      else m.vx = 0;
      // Sparks while prowling
      if (Math.random()<0.04) addParticle('电',m.x+Math.random()*m.w,m.y,(Math.random()-0.5)*20,-20,'#FFD600',10,0.3);
      if (m.tbTimer <= 0) {
        // Pick attack based on distance
        if (dist < 70 && dy < 50) {
          m.tbState = 'stomp_windup';
          m.tbTimer = 0.6;
          m.vx = 0;
        } else if (dist < 250) {
          m.tbState = 'charge_windup';
          m.tbTimer = 0.5;
          m.vx = 0;
          m.tbChargeFace = m.facing;
        } else {
          m.tbState = 'lightning';
          m.tbTimer = 0.8;
          m.vx = 0;
        }
      }
      break;

    case 'charge_windup':
      m.vx = 0;
      // Electricity gathers, body shakes
      if (Math.random()<0.25) addParticle('电',m.x+m.w/2+(Math.random()-0.5)*20,m.y+m.h/2,(Math.random()-0.5)*40,(Math.random()-0.5)*30,'#FFD600',12,0.2);
      if (m.tbTimer <= 0) {
        m.tbState = 'charge';
        m.tbTimer = 0.6;
      }
      break;

    case 'charge':
      m.vx = m.tbChargeFace * 320;
      // Lightning trail
      if (Math.random()<0.3) addParticle('电',m.x+m.w/2-m.tbChargeFace*20,m.y+m.h,(Math.random()-0.5)*10,-15,'#FFD600',14,0.4);
      // Contact damage
      if (!player.dead && player.hurtTimer<=0 && aabbHit(m.x-8,m.y,m.w+16,m.h,player.x,player.y,player.w,player.h)) {
        hurtPlayer(2);
        cam.shake(5,0.2);
      }
      if (m.tbTimer <= 0) {
        m.tbState = 'charge_recover';
        m.tbTimer = 0.8;
        m.vx = 0;
      }
      break;

    case 'charge_recover':
      m.vx *= 0.85;
      if (m.tbTimer <= 0) { m.tbState = 'prowl'; m.tbTimer = 1.2; }
      break;

    case 'stomp_windup':
      m.vx = 0;
      // Raise up before stomp
      if (Math.random()<0.2) addParticle('电',m.x+m.w/2,m.y-5,0,-30,'#FFD600',16,0.3);
      if (m.tbTimer <= 0) {
        m.tbState = 'stomp';
        m.tbTimer = 0.2;
        cam.shake(8,0.35);
        // AoE ground shockwave
        if (dist < 90 && dy < 60) hurtPlayer(3);
        for (let i=-2;i<=2;i++) {
          addParticle('震',m.x+m.w/2+i*20,m.y+m.h,i*30,-30-Math.random()*20,'#FDD835',18,0.5,100);
        }
        addParticle('电',m.x+m.w/2,m.y+m.h,0,-50,'#FFD600',22,0.6);
      }
      break;

    case 'stomp':
      m.vx = 0;
      if (m.tbTimer <= 0) { m.tbState = 'prowl'; m.tbTimer = 1.5; }
      break;

    case 'lightning':
      m.vx = 0;
      // Shoot chain lightning toward player
      if (m.tbTimer < 0.4 && m.tbTimer > 0.3) {
        const spd = 220;
        spawnProjectile(m.x+m.w/2, m.y+m.h/4, m.facing*spd, -30, '电', '#FFD600', 2);
        spawnProjectile(m.x+m.w/2, m.y+m.h/4, m.facing*spd*0.8, -60, '电', '#FDD835', 1);
        addParticle('电',m.x+m.w/2,m.y+m.h/4,m.facing*40,0,'#FFD600',16,0.3);
      }
      if (m.tbTimer <= 0) { m.tbState = 'prowl'; m.tbTimer = 1.0; }
      break;
  }
}

// Abyss Serpent: figure-8 flight, sweeping poison breath, dive attack
function aiAbyssSerpent(m, dt) {
  const dx = player.x - m.x;
  const dist = Math.abs(dx);
  m.facing = dx>0?1:-1;
  const homeY = m.flyInitY;

  if (!m.asState) m.asState = 'fly';
  if (m.asTimer === undefined) m.asTimer = 3.0;
  m.asTimer -= dt;

  switch(m.asState) {
    case 'fly':
      // Figure-8 flight pattern via velocity only
      m.vx = Math.cos(m.aiTimer * 1.2) * 80;
      m.y = homeY + Math.sin(m.aiTimer * 2.4) * (m.flyAmp||50);
      m.vy = 0;
      // Ambient poison drip
      if (Math.random()<0.04) addParticle('毒',m.x+Math.random()*m.w,m.y+m.h,(Math.random()-0.5)*8,10,'#CE93D8',8,0.5,30);
      if (m.asTimer <= 0) {
        if (dist < 200 && Math.random()<0.5) {
          m.asState = 'breath_charge';
          m.asTimer = 0.6;
        } else if (dist < 300) {
          m.asState = 'dive_aim';
          m.asTimer = 0.5;
          m.diveTargetX = player.x;
          m.diveTargetY = player.y;
        } else {
          m.asTimer = 2.0;
        }
      }
      break;

    case 'breath_charge':
      // Hover and charge poison
      m.vx = 0;
      m.y = homeY + Math.sin(m.aiTimer * 3) * 10;
      if (Math.random()<0.25) addParticle('息',m.x+m.w/2+m.facing*10,m.y+m.h/2,m.facing*15,0,'#CE93D8',12,0.3);
      if (m.asTimer <= 0) {
        m.asState = 'breath';
        m.asTimer = 0.8;
      }
      break;

    case 'breath':
      m.vx = 0;
      // Spray poison projectiles in a sweeping arc
      if (Math.random()<0.2) {
        const angle = (m.asTimer-0.4)*2 + (Math.random()-0.5)*0.3;
        const spd = 160;
        spawnProjectile(m.x+m.w/2, m.y+m.h/2, m.facing*spd*Math.cos(angle), spd*Math.sin(angle), '息', '#CE93D8', 1);
      }
      if (m.asTimer <= 0) {
        m.asState = 'fly';
        m.asTimer = 2.5;
      }
      break;

    case 'dive_aim':
      m.vx = 0;
      // Flash eyes to telegraph
      if (Math.random()<0.2) addParticle('冥',m.x+m.w/2,m.y+m.h/2,0,0,'#7B1FA2',16,0.2);
      if (m.asTimer <= 0) {
        m.asState = 'dive';
        m.asTimer = 0.4;
        // Calculate dive vector
        const tdx = m.diveTargetX - m.x;
        const tdy = m.diveTargetY - m.y;
        const len = Math.sqrt(tdx*tdx+tdy*tdy) || 1;
        m.vx = tdx/len * 350;
        m.vy = tdy/len * 350;
      }
      break;

    case 'dive':
      // Hurtle toward target, damaging on contact
      if (!player.dead && player.hurtTimer<=0 && aabbHit(m.x-5,m.y-5,m.w+10,m.h+10,player.x,player.y,player.w,player.h)) {
        hurtPlayer(2);
        cam.shake(5,0.2);
      }
      // Trail
      if (Math.random()<0.3) addParticle('冥',m.x+m.w/2,m.y+m.h/2,(Math.random()-0.5)*20,(Math.random()-0.5)*20,'#4A148C',14,0.3);
      if (m.asTimer <= 0) {
        m.asState = 'dive_recover';
        m.asTimer = 1.0;
        m.vx = 0; m.vy = 0;
      }
      break;

    case 'dive_recover':
      // Float back to home altitude
      m.vx *= 0.9;
      const targetY = homeY;
      m.y += (targetY - m.y) * dt * 3;
      m.vy = 0;
      if (m.asTimer <= 0) {
        m.asState = 'fly';
        m.asTimer = 2.0;
      }
      break;
  }
}

// Ancient Golem: shield phase, punch combo, ground laser
function aiAncientGolem(m, dt) {

  const dist = Math.abs(dx);

  if (m.comboStep === undefined) m.comboStep = 0;
  m.agTimer -= dt;

  switch(m.agState) {
    case 'guard':
      m.vx = 0;
      m.shielded = true;
      // Stand and block - takes half damage (handled in hurtMonster)
      if (Math.random()<0.03) addParticle('盾',m.x+m.w/2,m.y+m.h/2,(Math.random()-0.5)*10,0,'#8D6E63',12,0.4);
      if (m.agTimer <= 0) {
        if (dist < 180) {
          m.agState = 'advance';
          m.agTimer = 1.5;
          m.shielded = false;
        } else {
          m.agState = 'laser_charge';
          m.agTimer = 0.8;
          m.shielded = false;
        }
      }
      break;

    case 'advance':
      m.shielded = false;
      m.vx = m.facing * (m.speed||30) * 2.5;
      if (dist < 55 && dy < 50) {
        m.agState = 'punch';
        m.agTimer = 0.3;
        m.comboStep = 0;
        m.vx = 0;
      }
      if (m.agTimer <= 0) { m.agState = 'guard'; m.agTimer = 2.0; m.vx = 0; }

    case 'punch':
      m.vx = 0;
      m.shielded = false;
      if (m.agTimer <= 0) {

          // Continue combo
          m.agTimer = 0.35;
          m.vx = m.facing * 40;
        } else {
          // Combo finished, uppercut
          m.agState = 'uppercut';
          m.agTimer = 0.4;
          cam.shake(6,0.25);
          if (dist < 70 && dy < 60) {
            hurtPlayer(3);
          }
          addParticle('震',m.x+m.facing*m.w,m.y,m.facing*30,-80,'#5D4037',22,0.5);

    case 'uppercut':
      m.vx = 0;
      if (m.agTimer <= 0) { m.agState = 'guard'; m.agTimer = 2.5; m.comboStep = 0; }
      break;

    case 'laser_charge':
      m.vx = 0;
      m.shielded = false;
      // Eyes glow
      if (Math.random()<0.3) addParticle('光',m.x+m.w/2,m.y+10,(Math.random()-0.5)*5,-5,'#FF6D00',10,0.2);
      if (m.agTimer <= 0) {
        m.agState = 'laser';
        m.agTimer = 0.5;
        m.laserCount = 0;
        m.laserInterval = 0;
        m.laserFace = m.facing;
        m.laserX = m.x;
        m.laserY = m.y;
        cam.shake(4,0.3);
      }
      break;

    case 'laser':
      m.vx = 0;
      m.laserInterval -= dt;
      if (m.laserInterval <= 0 && m.laserCount < 5) {
        m.laserCount++;
        m.laserInterval = 0.08;
        const px = m.laserX + m.laserFace * m.laserCount * 35;
        spawnProjectile(px, m.laserY+m.h/2, m.laserFace*20, 0, '光', '#FF6D00', 2);
        addParticle('光',px,m.laserY+m.h/2,0,-15,'#FFD600',12,0.3);
      }
      if (m.agTimer <= 0) { m.agState = 'guard'; m.agTimer = 2.0; }
      break;
  }
}

function aiShadow(m, dt) {
  const dx = player.x - m.x;
  const dist = Math.abs(dx);
  const dy = Math.abs(player.y - m.y);
  m.facing = dx>0?1:-1;

  if (!m.shadowState) m.shadowState = 'stalk';

  m.shadowTimer -= dt;

  switch(m.shadowState) {
    case 'stalk':
      // Float toward player slowly
      if (dist > 60) {

        m.vx *= 0.8;
      }
      // Drift vertically toward player

      if (m.shadowTimer <= 0) {

        m.shadowTimer = 0.25;
        m.vx = m.dashDx * 350;
      }

        m.vx = 0; m.vy = 0;
      }

      m.vy *= 0.9;
      if (m.shadowTimer <= 0) {

        m.shadowTimer = 0.5;
      }

}

// Ghost General AI - summons shadows, retreats and commands
function aiGhostGeneral(m, dt) {

        m.ghostTimer = 0.8;

      }
      break;

      m.vx = 0;

      if (m.ghostTimer <= 0) {

        m.patrolDist = 0;
      }
