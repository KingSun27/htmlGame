  const homeY = m.flyInitY || m.y;
  if (m.fdState === 'hover' || m.fdState === 'recover') {
    m.y = homeY + Math.sin(m.aiTimer * 1.2) * (m.flyAmp || 30);
    m.vy = 0;
  }

  const pickAttack = () => {
    // Module 1: flame attacks (all phases)
    // Module 2: dive attacks (phase 2+)
    // Module 3: rain of fire (phase 3, or sometimes phase 2)
    const atks = ['flame_spread', 'flame_breath', 'swoop'];
    if (m.phase >= 2) atks.push('dive_bomb', 'flame_wave');
    if (m.phase >= 3) atks.push('fire_rain', 'fury_barrage');
    return atks[Math.floor(Math.random() * atks.length)];
  };

  switch (m.fdState) {
    case 'hover':
      // Idle hovering, drift toward player
      m.vx = m.facing * 40;
      if (m.fdTimer <= 0) {
        m.fdState = pickAttack();
        m.fdTimer = 0.8;
        m.vx = 0;
      }
      break;

    // MODULE 1: Flame attacks
    case 'flame_spread':
      // Spread 3-5 fireballs in a fan pattern
      m.vx = 0;
      m.vy = 0;
      if (m.fdTimer > 0.4) {
        if (Math.random() < 0.2) addParticle('焰', m.x+m.w/2, m.y+m.h, m.facing*15, 10, '#FF5722', 14, 0.3);
      } else if (m.fdTimer > 0.3) {
        const count = m.phase >= 3 ? 5 : (m.phase >= 2 ? 4 : 3);
        for (let i = 0; i < count; i++) {
          const angle = (i - (count-1)/2) * 0.4;
          const spd = 150 + m.phase * 20;
          spawnProjectile(m.x+m.w/2, m.y+m.h, m.facing*spd*Math.cos(angle)+Math.sin(angle)*40, spd*Math.sin(angle)+60, '火', '#FF5722', 1);
        }
        cam.shake(3, 0.15);
        m.fdTimer = 0.2;
      }
      if (m.fdTimer <= 0) { m.fdState = 'recover'; m.fdTimer = 0.8; }
      break;

    case 'flame_breath':
      // Stream of fire in player direction
      m.vx = 0;
      m.vy = 0;
      if (m.fdTimer > 0.5) {
        if (Math.random() < 0.25) addParticle('吼', m.x+m.w/2, m.y+m.h/2, m.facing*20, -10, '#FF3D00', 16, 0.35);
      } else if (m.fdTimer > 0) {
        // Rapid fire stream
        if (Math.random() < 0.35) {
          const spread = (Math.random()-0.5) * 30;
          spawnProjectile(m.x+m.w/2+m.facing*20, m.y+m.h/2, m.facing*(180+Math.random()*60), spread+30, '焰', '#FF3D00', 1);
        }
      }
      if (m.fdTimer <= -0.3) { m.fdState = 'recover'; m.fdTimer = 0.6; }
      break;

    case 'flame_wave':
      // Phase2+: fire wave along ground
      m.vx = 0;
      m.vy = 0;
      if (m.fdTimer > 0.4) {
        if (Math.random() < 0.15) addParticle('焰', m.x+m.w/2, m.y+m.h, 0, 10, '#FF6D00', 14, 0.3);
      } else if (m.fdTimer > 0.3) {
        // Fire wave along ground from dragon position
        for (let i = 0; i < 4; i++) {
          const waveVx = m.facing * (100 + i * 50);
          const p = {x: m.x+m.w/2, y: m.y+m.h-8, vx: waveVx, vy: -60-i*20, c:'焰', col:'#FF6D00', dmg:2, w:14, h:14, life:2.0, fromPlayer:false, hasGravity:true};
          projectiles.push(p);
        }
        cam.shake(5, 0.2);
        m.fdTimer = 0.2;
      }
      if (m.fdTimer <= 0) { m.fdState = 'recover'; m.fdTimer = 0.7; }
      break;

    // MODULE 2: Dive attacks
    case 'swoop':
      // Quick swoop toward player
      if (m.fdTimer > 0.4) {
        // Rise up
        m.vy = -200;
        m.vx = 0;
      } else if (m.fdTimer > 0) {
        // Dive toward player
        m.vx = m.facing * 350;
        m.vy = 200;
        if (!player.dead && aabbHit(m.x-8,m.y,m.w+16,m.h,player.x,player.y,player.w,player.h)) {
          hurtPlayer(2);
          cam.shake(6, 0.2);
        }
      }
      if (m.fdTimer <= 0) {
        m.vx = 0;
        m.vy = 0;
        m.y = homeY;
        m.fdState = 'recover';
        m.fdTimer = 1.0;
      }
      break;

    case 'dive_bomb':
      // Phase2+: rise high then slam down with explosion
      if (m.fdTimer > 0.5) {
        m.vy = -300;
        m.vx = m.facing * 30;
        if (Math.random() < 0.15) addParticle('翼', m.x+m.w/2, m.y+m.h, (Math.random()-0.5)*30, 10, '#FF5722', 16, 0.3);
      } else if (m.fdTimer > 0.15) {
        // Dive straight down at player x
        m.vy = 500;
        m.vx = m.facing * 100;
      } else if (m.fdTimer > 0) {
        // Impact
        cam.shake(10, 0.3);
        for (let i = 0; i < 5; i++) {
          addParticle('爆', m.x+m.w/2+(Math.random()-0.5)*40, m.y+m.h, (Math.random()-0.5)*80, -60-Math.random()*40, '#FF3D00', 18, 0.5);
        }
        // Explosion projectiles in all directions
        for (let i = 0; i < 6; i++) {
          const angle = (i / 6) * Math.PI * 2;
          spawnProjectile(m.x+m.w/2, m.y+m.h, Math.cos(angle)*120, Math.sin(angle)*120-40, '焰', '#FF5722', 2);
        }
        if (dist < 80 && Math.abs(player.y - m.y) < 50) hurtPlayer(3);
        m.fdTimer = -0.1;
      }
      if (m.fdTimer <= -0.1) {
        m.vy = 0; m.vx = 0;
        m.y = homeY;
        m.fdState = 'recover';
        m.fdTimer = 1.2;
      }
      break;

    // MODULE 3: Rain of fire
    case 'fire_rain':
      // Phase3: fly across screen raining fire
      m.vy = -100;
      m.vx = m.facing * 200;
      if (m.y < homeY - 80) m.vy = 0;
      if (Math.random() < 0.2) {
        const rx = m.x + m.w/2 + (Math.random()-0.5)*40;
        spawnProjectile(rx, m.y+m.h, (Math.random()-0.5)*20, 120+Math.random()*60, '雨', '#FF3D00', 1);
        addParticle('焰', rx, m.y+m.h, 0, 20, '#FF6D00', 10, 0.25);
      }
      if (m.fdTimer <= -1.5) {
        m.vx = 0; m.vy = 0;
        m.y = homeY;
        m.fdState = 'recover';
        m.fdTimer = 1.0;
      }
      break;

    case 'fury_barrage':
      // Phase3: rapid fire in random directions while moving
      m.vx = m.facing * 150;
      m.vy = Math.sin(m.aiTimer * 3) * 60;
      if (Math.random() < 0.2) {
        spawnProjectile(m.x+m.w/2, m.y+m.h/2, (Math.random()-0.5)*200, 40+Math.random()*120, '焰', '#FF1744', 2);
      }
      if (m.fdTimer <= -1.2) {
        m.vx = 0; m.vy = 0;
        m.y = homeY;
        m.fdState = 'recover';
        m.fdTimer = 1.5;
      }
      break;

    case 'recover':
      m.vx *= 0.9;
      if (m.fdTimer <= 0) {
        const idleTime = m.phase >= 3 ? 0.6 : (m.phase >= 2 ? 1.0 : 1.5);
        m.fdState = 'hover';
        m.fdTimer = idleTime;
      }
      break;
  }
}

function aiBoss(m, dt) {
  const dx = player.x - m.x;
  const dist = Math.abs(dx);
  m.facing = dx>0?1:-1;
  const hpPct = m.hp / m.maxHp;
  if (!m.phase) m.phase = 1;
  if (hpPct < 0.6 && m.phase===1) m.phase=2;
  if (hpPct < 0.3 && m.phase===2) m.phase=3;

  if (!m.bossState) m.bossState = 'idle';
  if (m.bossTimer === undefined) m.bossTimer = 1.0;
  if (m.bossCombo === undefined) m.bossCombo = 0;
  m.bossTimer -= dt;

  const pickAttack = () => {
    const attacks = ['dash','slam','projectile'];
    if (m.phase >= 2) attacks.push('summon');
    if (m.phase >= 3) attacks.push('barrage');
    return attacks[Math.floor(Math.random()*attacks.length)];
  };

  switch(m.bossState) {
    case 'idle':
      m.vx = m.facing * (m.speed||80);
      if (m.bossTimer <= 0) {
        m.bossState = pickAttack();
        m.bossTimer = 0.6;
        m.vx = 0;
      }
      break;

    case 'dash':
      // Windup then dash
      if (m.bossTimer > 0.3) {
        m.vx = 0;
        if (Math.random()<0.15) addParticle('冲', m.x+m.w/2, m.y+m.h/2, m.facing*20, 0, '#D50000', 14, 0.3);
      } else if (m.bossTimer > 0) {
        m.vx = m.facing * 400;
        if (!player.dead && aabbHit(m.x-5,m.y,m.w+10,m.h,player.x,player.y,player.w,player.h)) {
          hurtPlayer(2);
          cam.shake(5,0.2);
        }
      }
      if (m.bossTimer <= 0) {
        m.bossState = 'recover';
        m.bossTimer = 0.8;
        m.vx = 0;
      }
      break;

    case 'slam':
      // Jump up then slam down
      if (m.bossTimer > 0.35) {
        if (m.vy >= 0) m.vy = -500;
        m.vx = m.facing * 60;
      } else if (m.bossTimer > 0) {
        if (m.vy < 400) m.vy = 600;
        m.vx = 0;
      }
      if (m.bossTimer <= 0 || (m.grounded && m.bossTimer < 0.3)) {
        cam.shake(8, 0.3);
        addParticle('震', m.x+m.w/2, m.y+m.h, -40, -20, '#D50000', 20, 0.5);
        addParticle('震', m.x+m.w/2, m.y+m.h, 40, -20, '#D50000', 20, 0.5);
        addParticle('震', m.x+m.w/2, m.y+m.h, 0, -40, '#D50000', 24, 0.5);
        if (dist < 80 && Math.abs(player.y - m.y) < 60) hurtPlayer(3);
        m.bossState = 'recover';
        m.bossTimer = 1.0;
        m.vy = 0;
      }
      break;

    case 'projectile':
      m.vx = 0;
      if (m.bossTimer > 0.3) {
        // Charge up
        if (Math.random()<0.2) addParticle('暗', m.x+m.w/2, m.y+m.h/2, (Math.random()-0.5)*30, (Math.random()-0.5)*30, '#D50000', 12, 0.3);
      } else if (m.bossTimer > 0.2) {
        // Fire
        const spread = m.phase >= 3 ? 3 : (m.phase >= 2 ? 2 : 1);
        for (let i=0; i<spread; i++) {
          const angle = (i - (spread-1)/2) * 0.3;
          const spd = 200;
          spawnProjectile(m.x+m.w/2, m.y+m.h/2, m.facing*spd*Math.cos(angle), spd*Math.sin(angle), '暗', '#D50000', 2);
        }
        m.bossTimer = 0.1;
      }
      if (m.bossTimer <= 0) {
        m.bossState = 'recover';
        m.bossTimer = 0.6;
      }
      break;

    case 'summon':
      m.vx = 0;
      if (m.bossTimer > 0.3) {
        if (Math.random()<0.2) addParticle('影', m.x+m.w/2, m.y, (Math.random()-0.5)*40, -30, '#D50000', 14, 0.4);
      }
      if (m.bossTimer <= 0.3 && m.bossTimer > 0.2) {
        const count = m.phase >= 3 ? 3 : 2;
        for (let i=0; i<count; i++) {
          if (monsters.length < 12) {
            const sx = m.x + (Math.random()-0.5)*120;
            monsters.push(createMonster('影', sx, m.y - 20));
            addParticle('影', sx+12, m.y-6, 0, -40, '#444', 18, 0.5);
          }
        }
        cam.shake(4, 0.15);
        m.bossTimer = 0.1;
      }
      if (m.bossTimer <= 0) {
        m.bossState = 'recover';
        m.bossTimer = 0.8;
      }
      break;

    case 'barrage':
      m.vx = m.facing * 120;
      if (Math.random() < 0.15) {
        spawnProjectile(m.x+m.w/2, m.y+m.h/2, (Math.random()-0.5)*200, -100+Math.random()*200, '暗', '#FF1744', 2);
      }
      if (m.bossTimer <= -1.0) {
        m.bossState = 'recover';
        m.bossTimer = 1.2;
        m.vx = 0;
      }
      break;

    case 'recover':
      m.vx *= 0.9;
      if (m.bossTimer <= 0) {
        m.bossCombo++;
        // Faster cycle at lower HP
        const idleTime = m.phase >= 3 ? 0.5 : (m.phase >= 2 ? 0.8 : 1.2);
        m.bossState = 'idle';
        m.bossTimer = idleTime;
      }
      break;
  }
}

// ==================== DRAGON BOSS AI ====================
function aiDragonBoss(m, dt) {
  const dx = player.x - m.x;
  const dist = Math.abs(dx);
  m.facing = dx > 0 ? 1 : -1;
  const hpPct = m.hp / m.maxHp;
  if (!m.phase) m.phase = 1;
  if (hpPct < 0.6 && m.phase === 1) m.phase = 2;
  if (hpPct < 0.3 && m.phase === 2) m.phase = 3;

  if (!m.dragonState) m.dragonState = 'idle';
  if (m.dragonTimer === undefined) m.dragonTimer = 1.5;
  m.dragonTimer -= dt;

  const pickAttack = () => {
    const atks = ['flame_breath','bite','dive','fly_flame'];
    if (m.phase >= 2) atks.push('tail_sweep','triple_flame');
    if (m.phase >= 3) atks.push('rage_dive','summon_flame');
    return atks[Math.floor(Math.random() * atks.length)];
  };

  switch (m.dragonState) {
    case 'idle':
      m.vx = m.facing * (m.speed || 60);
      m.dragonFlying = false;
      if (m.dragonTimer <= 0) {
        m.dragonState = pickAttack();
        m.dragonTimer = 0.8;
        m.vx = 0;
      }
      break;

    // Ground flame breath: 3 parabolic fireballs
    case 'flame_breath':
      m.vx = 0;
      if (m.dragonTimer > 0.4) {
        // Charge up - roar particles
        if (Math.random() < 0.25) addParticle('吼', m.x + m.w/2, m.y, (Math.random()-0.5)*40, -30, '#FF3D00', 16, 0.4);
      } else if (m.dragonTimer > 0.25) {
        // Fire 3 parabolic flames
        const baseSpd = 180 + m.phase * 30;
        for (let i = 0; i < 3; i++) {
          const angle = -0.5 + i * 0.25; // upward arcs
          const vx = m.facing * baseSpd * (0.7 + i * 0.25);
          const vy = -160 - i * 40;
          const p = {x: m.x + m.w/2 + m.facing*30, y: m.y + 20,
            vx, vy, c:'焰', col:'#FF3D00', dmg:2, w:14, h:14, life:2.5, fromPlayer:false, hasGravity:true};
          projectiles.push(p);
        }
        m.dragonTimer = 0.15;
      }
      if (m.dragonTimer <= 0) {
        m.dragonState = 'recover';
        m.dragonTimer = 0.8;
      }
      break;

    // Bite attack - lunge forward
    case 'bite':
      if (m.dragonTimer > 0.4) {
        m.vx = 0;
        if (Math.random() < 0.15) addParticle('噬', m.x + m.facing*m.w, m.y + m.h/2, m.facing*15, 0, '#D50000', 14, 0.3);
      } else if (m.dragonTimer > 0) {
        m.vx = m.facing * 350;
        if (!player.dead && aabbHit(m.x - 10, m.y, m.w + 20, m.h, player.x, player.y, player.w, player.h)) {
          hurtPlayer(3);
          cam.shake(6, 0.25);
        }
      }
      if (m.dragonTimer <= 0) {
        m.dragonState = 'recover';
        m.dragonTimer = 1.0;
        m.vx = 0;
      }
      break;

    // Dive from sky
    case 'dive':
      if (m.dragonTimer > 0.5) {
        // Fly up
        m.dragonFlying = true;
        m.vy = -350;
        m.vx = m.facing * 30;
        m.dragonDiveStartY = m.y;
      } else if (m.dragonTimer > 0.15) {
        // Hover, track player X
        m.vy = 0;
        m.vx = (player.x - m.x) > 0 ? 120 : -120;
        m.dragonFlying = true;
      } else if (m.dragonTimer > -0.5) {
        // Dive down
        m.dragonFlying = false;
        m.vy = 650;
        m.vx = m.facing * 60;
        if (!player.dead && aabbHit(m.x - 5, m.y, m.w + 10, m.h + 10, player.x, player.y, player.w, player.h)) {
          hurtPlayer(3);
          cam.shake(8, 0.3);
        }
      }
      if (m.grounded && m.dragonTimer < 0.1) {
        cam.shake(10, 0.4);
        addParticle('震', m.x + m.w/2, m.y + m.h, -50, -30, '#D50000', 22, 0.5);
        addParticle('震', m.x + m.w/2, m.y + m.h, 50, -30, '#D50000', 22, 0.5);
        addParticle('震', m.x + m.w/2, m.y + m.h, 0, -50, '#FF3D00', 26, 0.5);
        if (dist < 100 && Math.abs(player.y - m.y) < 70) hurtPlayer(2);
        m.dragonState = 'recover';
        m.dragonTimer = 1.2;
        m.dragonFlying = false;
        m.vy = 0;
        m.vx = 0;
      }
      if (m.dragonTimer <= -1.5) {
        m.dragonState = 'recover';
        m.dragonTimer = 1.0;
        m.dragonFlying = false;
        m.vx = 0;
      }
      break;

    // Fly and shoot flames downward
    case 'fly_flame':
      if (m.dragonTimer > 0.3) {
        m.dragonFlying = true;
        m.vy = -250;
        m.vx = m.facing * 80;
      } else if (m.dragonTimer > -1.5) {
        m.dragonFlying = true;
        m.vy = -10;
        m.vx = m.facing * 100;
        // Shoot flames periodically
        if (Math.random() < 0.08) {
          const p = {x: m.x + m.w/2, y: m.y + m.h,
            vx: (Math.random()-0.5)*60, vy: 120 + Math.random()*80,
            c:'焰', col:'#FF5722', dmg:2, w:12, h:12, life:2, fromPlayer:false, hasGravity:true};
          projectiles.push(p);
          addParticle('火', m.x + m.w/2, m.y + m.h, (Math.random()-0.5)*20, 10, '#FF5722', 10, 0.3);
        }
      }
      if (m.dragonTimer <= -2.0) {
        m.dragonState = 'recover';
        m.dragonTimer = 1.0;
        m.dragonFlying = false;
        m.vx = 0;
      }
      break;

    // Tail sweep (phase 2+)
    case 'tail_sweep':
      m.vx = 0;
      if (m.dragonTimer > 0.3) {
        if (Math.random() < 0.15) addParticle('尾', m.x - m.facing*20, m.y + m.h/2, -m.facing*30, 0, '#C62828', 16, 0.3);
      } else if (m.dragonTimer > 0.1) {
        // Sweep: damage in wide area behind
        const sweepX = m.x - m.facing * 60;
        if (!player.dead && aabbHit(sweepX, m.y, 120, m.h, player.x, player.y, player.w, player.h)) {
          hurtPlayer(2);
          cam.shake(5, 0.2);
        }
        addParticle('尾', m.x - m.facing*40, m.y + m.h*0.7, -m.facing*80, -20, '#C62828', 20, 0.4);
        m.dragonTimer = 0.05;
      }
      if (m.dragonTimer <= 0) {
        m.dragonState = 'recover';
        m.dragonTimer = 0.8;
      }
      break;

    // Triple parabolic flame (phase 2+)
    case 'triple_flame':
      m.vx = 0;
      if (m.dragonTimer > 0.4) {
        if (Math.random() < 0.3) addParticle('吼', m.x + m.facing*m.w, m.y + 10, m.facing*25, -15, '#FF3D00', 18, 0.3);
      } else if (m.dragonTimer > 0.25) {
        // Fire 5 parabolic flames with wider spread
        for (let i = 0; i < 5; i++) {
          const baseSpd = 150 + m.phase * 20;
          const vx = m.facing * baseSpd * (0.5 + i * 0.2);
          const vy = -200 - i * 30 + (Math.random()-0.5)*40;
          const p = {x: m.x + m.w/2 + m.facing*30, y: m.y + 15,
            vx, vy, c:'焰', col:'#FF6D00', dmg:2, w:14, h:14, life:3, fromPlayer:false, hasGravity:true};
          projectiles.push(p);
        }
        m.dragonTimer = 0.1;
      }
      if (m.dragonTimer <= 0) {
        m.dragonState = 'recover';
        m.dragonTimer = 1.0;
      }
      break;

    // Rage dive (phase 3) - multiple rapid dives
    case 'rage_dive':
      if (!m._rageDiveCount) m._rageDiveCount = 0;
      if (m.dragonTimer > 0.3) {
        m.dragonFlying = true;
        m.vy = -400;
        m.vx = (player.x - m.x) > 0 ? 150 : -150;
      } else if (m.dragonTimer > -0.3) {
        m.dragonFlying = false;
        m.vy = 700;
        m.vx = m.facing * 80;
        if (!player.dead && aabbHit(m.x - 8, m.y, m.w + 16, m.h + 8, player.x, player.y, player.w, player.h)) {
          hurtPlayer(3);
          cam.shake(6, 0.2);
        }
      }
      if (m.grounded && m.dragonTimer < 0) {
        m._rageDiveCount++;
        cam.shake(6, 0.2);
        addParticle('震', m.x+m.w/2, m.y+m.h, -40, -25, '#FF1744', 18, 0.4);
        addParticle('震', m.x+m.w/2, m.y+m.h, 40, -25, '#FF1744', 18, 0.4);
        if (m._rageDiveCount >= 3) {
          m.dragonState = 'recover';
          m.dragonTimer = 1.5;
          m._rageDiveCount = 0;
          m.dragonFlying = false;
          m.vx = 0;
        } else {
          m.dragonTimer = 0.5;
          m.vy = 0;
        }
      }
      if (m.dragonTimer <= -2.0) {
        m.dragonState = 'recover';
        m.dragonTimer = 1.2;
        m._rageDiveCount = 0;
        m.dragonFlying = false;
        m.vx = 0;
      }
      break;

    // Summon flame rain (phase 3)
    case 'summon_flame':
      m.vx = 0;
      if (m.dragonTimer > 0.3) {
        if (Math.random() < 0.2) addParticle('啸', m.x + m.w/2, m.y - 10, (Math.random()-0.5)*40, -40, '#FF6D00', 16, 0.4);
      } else if (m.dragonTimer > -2.0) {
        // Rain fire from above
        if (Math.random() < 0.12) {
          const rx = m.x + (Math.random()-0.5) * 300;
          const p = {x: rx, y: m.y - 200,
            vx: (Math.random()-0.5)*30, vy: 200 + Math.random()*100,
            c:'焰', col:'#FF3D00', dmg:2, w:12, h:12, life:2.5, fromPlayer:false, hasGravity:true};
          projectiles.push(p);
        }
      }
      if (m.dragonTimer <= -2.5) {
        m.dragonState = 'recover';
        m.dragonTimer = 1.5;
      }
      break;

    case 'recover':
      m.vx *= 0.9;
      m.dragonFlying = false;
      if (m.dragonTimer <= 0) {
        m.dragonCombo++;
        const idleTime = m.phase >= 3 ? 0.4 : (m.phase >= 2 ? 0.7 : 1.0);
        m.dragonState = 'idle';
        m.dragonTimer = idleTime;
      }
      break;
  }
}

function hurtMonster(m, dmg) {
  if (m.dead) return;
  let actualDmg = dmg;
  // Ancient Golem shield: halve damage and reduce knockback
  if (m.shielded) {
    actualDmg = Math.max(1, Math.floor(dmg / 2));
    addParticle('盾', m.x+m.w/2, m.y+m.h/2, (Math.random()-0.5)*30, -30, '#8D6E63', 16, 0.3);
  }
  m.hp -= actualDmg;
  m.hurtTimer = 0.3;
  m.vx = (player.x < m.x ? 1 : -1) * (m.shielded ? 30 : 100);
  addParticle(cnNum(actualDmg), m.x+m.w/2, m.y-10, 0, -60, '#FFD600', 16, 0.7, 0);
  if (player.fireWeapon) m.burning = 3;
  if (player.poisonWeapon) m.poisoned = 3;
  if (player.frostWeapon) m.stunned = Math.max(m.stunned, 2);

  if (m.hp <= 0) {
    m.dead = true;
    m.deathTimer = 0.5;
    // Track kill
    if (!killStats[m.type]) killStats[m.type] = 0;
    killStats[m.type]++;
    const chars = getMonsterChars(m.type);
    for (const c of chars) {
      addParticle(c, m.x+m.w/2, m.y+m.h/2, (Math.random()-0.5)*120, -80-Math.random()*60, '#888', 18, 0.6, 200);
    }
    if (m.drops && m.drops.length > 0 && Math.random() < (m.dropChance||0.5)) {
      // Drop ALL items, spread horizontally to avoid overlap
      const count = m.drops.length;
      const spacing = 24;
      const startX = m.x + m.w/2 - (count-1)*spacing/2;
      for (let di=0; di<count; di++) {
        spawnItem(m.drops[di], startX + di*spacing, m.y);
      }
    }
    // Story character drops from bosses
    if (m.type === '火龙' && !storyChars.includes('龙')) {
      storyChars.push('龙');
      storyCharAnim = {char:'龙', phase:'drop', timer:0, x:m.x+m.w/2, y:m.y, targetX:GAME_W-60, targetY:10, size:36};
      messageText = '获得剧情字：龙';
      messageTimer = 3;
    }
    if (m.type === '魔王' && !storyChars.includes('魔')) {
      storyChars.push('魔');
      storyCharAnim = {char:'魔', phase:'drop', timer:0, x:m.x+m.w/2, y:m.y, targetX:GAME_W-40, targetY:10, size:36};
      messageText = '获得剧情字：魔';
      messageTimer = 3;
    }
  }
}

function getMonsterChars(type) {
  switch(type) {
    case '魔': return ['魔'];
    case '野猪': return ['野','猪'];
    case '毒蛛': return ['毒','蛛'];
    case '蝙蝠': return ['蝙','蝠'];
    case '火法师': return ['火','法','师'];
    case '骷髅': return ['骷','髅'];
    case '巨石人': return ['巨','石','人'];
    case '影': return ['影'];
    case '鬼将': return ['鬼','将'];
    case '火龙': return ['火','龙'];
    case '魔王': return ['魔','王'];
    case '魔龙': return ['魔','龙','翼','鳞','爪','尾','角'];
    case '长蛇': return ['长','蛇'];
    case '树妖': return ['树','妖'];
    case '冰灵': return ['冰','灵'];
    case '刺客': return ['刺','客'];
    case '雷兽': return ['雷','兽'];
    case '熔炎魔': return ['熔','炎','魔'];
    case '冥蟒': return ['冥','蟒'];
    case '古傀儡': return ['古','傀','儡'];
    default: return [type];
  }
}

function renderMonster(ctx, m) {
  if (m.dead) return;
  const ox = m.x - cam.x + cam.shakeX;
  const oy = m.y - cam.y + cam.shakeY;
  const flash = m.hurtTimer > 0 && Math.floor(m.hurtTimer*10)%2===0;
  const alpha = m.type==='影' ? (m.shadowState==='dash' ? 0.7 : 0.35) : 1;

  // Assassin: nearly invisible when hiding
  if (m.type === '刺客' && !m.assVisible) {

  switch(m.type) {

      atlas.draw(ctx,'猪',22,flash?'#fff':'#795548',ox+22,oy,alpha);
      break;
    case '毒蛛':

      break;
    case '蝙蝠':

      atlas.draw(ctx,'蝠',16,flash?'#fff':'#616161',ox+16,oy,alpha);
      break;
    case '火法师':
      atlas.draw(ctx,'火',20,flash?'#fff':'#FF5722',ox+6,oy-2,alpha);

      atlas.draw(ctx,'师',18,flash?'#fff':'#FF5722',ox+16,oy+18,alpha);
      break;
    case '骷髅':
      atlas.draw(ctx,'骷',20,flash?'#fff':'#ECEFF1',ox,oy,alpha);
      atlas.draw(ctx,'髅',20,flash?'#fff':'#ECEFF1',ox,oy+20,alpha);
      break;
    case '巨石人': {
      // Shake during windup
      const wShake = m.slamState==='windup' ? (Math.random()-0.5)*4 : 0;

      atlas.draw(ctx,'石',28,flash?'#fff':'#9E9E9E',ox+4+wShake,oy+22,alpha);

    }
    case '影': {

      ctx.save();
      if (dashStretch > 1) {
        ctx.translate(ox+12, oy+14);
        ctx.scale(dashStretch, 1/dashStretch);

    case '鬼将': {

    case '刺客': {

    case '雷兽': {

      }

    }
    case '熔炎魔': {
      // Glow pulsates

      // Punch windup arm glow
      if (m.ldState==='punch_windup') {

      }
      atlas.draw(ctx,'熔',26,flash?'#fff':'#FF6D00',ox+8,oy,lavaGlow);
      atlas.draw(ctx,'炎',28,flash?'#fff':'#BF360C',ox+6,oy+24,alpha);

      // Eruption charge glow
      if (m.ldState==='eruption_charge') {
        atlas.draw(ctx,'焰',14+Math.sin(m.ldTimer*8)*4,'#FF3D00',ox+m.w/2-8,oy-10,0.5);
      }

    }
    case '冥蟒': {
      // Body undulates in flight
      const sway = Math.sin(m.aiTimer*3)*4;
      const diveAlpha = m.asState==='dive' ? 0.7 : alpha;
      // Dive trail
      if (m.asState==='dive' && Math.random()<0.2) {
        addParticle('冥',m.x+m.w/2,m.y+m.h/2,(Math.random()-0.5)*15,(Math.random()-0.5)*15,'#4A148C',12,0.3);
      }
      atlas.draw(ctx,'冥',26,flash?'#fff':'#7B1FA2',ox+14+sway,oy-4,diveAlpha);
      atlas.draw(ctx,'蟒',30,flash?'#fff':'#4A148C',ox+10-sway,oy+20,diveAlpha);
      // Breath charge mouth glow
      if (m.asState==='breath_charge'||m.asState==='breath') {

      }
      break;
    }
    case '古傀儡': {
      // Shield glow when guarding
      if (m.shielded) {
        const shieldAlpha = 0.3+Math.sin(m.aiTimer*2)*0.1;
        ctx.save();
        ctx.globalAlpha = shieldAlpha;
        ctx.fillStyle = '#8D6E63';
        ctx.beginPath();
        ctx.arc(ox+m.w/2, oy+m.h/2, m.w*0.7, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      }
      // Punch combo animation
      const punchOff = m.agState==='punch' ? m.facing*8*Math.sin(m.agTimer*25) : 0;
      atlas.draw(ctx,'古',26,flash?'#fff':'#5D4037',ox+10+punchOff,oy,alpha);
      atlas.draw(ctx,'傀',26,flash?'#fff':'#4E342E',ox+10,oy+26,alpha);
      atlas.draw(ctx,'儡',26,flash?'#fff':'#3E2723',ox+10,oy+52,alpha);
      // Laser charge eyes
      if (m.agState==='laser_charge') {
        atlas.draw(ctx,'光',10+Math.sin(m.agTimer*12)*3,'#FF6D00',ox+14,oy+8,0.7);
        atlas.draw(ctx,'光',10+Math.sin(m.agTimer*12)*3,'#FF6D00',ox+30,oy+8,0.7);
      }
      break;
    }
    case '魔龙': {
      const f = m.facing;
      const t = m.aiTimer || 0;
      const st = m.dragonState || 'idle';
      const glow = m.phase===3 ? '#FF1744' : (m.phase===2 ? '#D50000' : '#B71C1C');
      const bodyShake = (st==='bite'||st==='rage_dive') ? (Math.random()-0.5)*4 : 0;
      const sk = bodyShake;
      const cx = m.w / 2;

      // ---- Wing animation state ----
      // wp: 0=folded, 1=spread
      let wTgt = 0.5, wSpd = 3;
      if (st==='idle') { wTgt = 0.35 + Math.sin(t*1.2)*0.1; wSpd = 2; }
      else if (st==='fly_flame'||st==='summon_flame') { wTgt = 1.0; wSpd = 6; }
      else if (m.dragonFlying) { wTgt = 0.95; wSpd = 8; }
      else if (st==='dive'||st==='rage_dive') { wTgt = m.dragonTimer>0.15?1.0:0.08; wSpd = 12; }
      else if (st==='flame_breath'||st==='triple_flame') { wTgt = 0.9; wSpd = 5; }
      else if (st==='bite') { wTgt = m.dragonTimer/0.8>0.5?0.2:0.95; wSpd = 14; }
      else if (st==='tail_sweep') { wTgt = 0.7; }
      else if (st==='recover') { wTgt = 0.15; wSpd = 4; }
      if (m._wp === undefined) m._wp = 0.5;
      m._wp += (wTgt - m._wp) * Math.min(1, wSpd * 0.016);
      const wp = m._wp;

      // Wing beat (vertical flap offset)
      let wBeat = Math.sin(t * 3) * 3;
      if (st==='fly_flame'||st==='summon_flame'||st==='dive'||st==='rage_dive') wBeat = Math.sin(t*10)*7;
      else if (m.dragonFlying) wBeat = Math.sin(t*8)*6;
      else if (st==='bite') wBeat = Math.sin(t*14)*5;


      const drawWing = (dir, sx, sy) => {
        const sz = 14;
        const g = sz * 1.3;

        // Triangle vertices at full spread, relative to shoulder S=(0,0)
        // Hypotenuse length
        const hypLen = g * 6;

        const SF = hypLen * 3 / 4;
        const FT = hypLen / 4;
        const Rh = hypLen * Math.sqrt(3) / 4; // height of R above hypotenuse

        // Vertices (spread)
        // S = (0, 0), T = (hypLen, 0), R = (SF, -Rh), F = (SF, 0)

        // Fold angles: when wp=0, sub-triangles fold down ~90°
        const foldInner = (1 - wp) * Math.PI * 0.5;  // inner sub-tri (S-R-F)
        const foldOuter = (1 - wp) * Math.PI * 0.45;  // outer sub-tri (F-R-T), slightly less

        // Rotate point (px,py) around pivot (pivX, pivY) by angle (clockwise)
        const rotP = (px, py, pivX, pivY, angle) => {
          const dx = px - pivX, dy = py - pivY;
          const c = Math.cos(angle), s = Math.sin(angle);
          return [pivX + dx*c - dy*s, pivY + dx*s + dy*c];
        };

        // Fill each sub-triangle with 翼 chars
        const cols = ['#1A0000','#2D0000','#440000','#5C0000','#700000','#8B0000','#A01010'];

        // Sub-triangle 1: S(0,0) → R(SF,-Rh) → F(SF,0)
        // Scan rows from S edge to F edge
        const n1 = 4; // rows in inner sub-tri
        for (let r = 0; r < n1; r++) {
          const rf = r / (n1 - 1); // 0=S side, 1=F side
          // Left edge: lerp S→S (always at x=0 bottom) → actually along S→F bottom
          // Right edge: lerp S→R (going up to peak)
          // Better: scan horizontally. At fraction rf along SF:
          const baseX = SF * rf;  // x along bottom S→F
          const topX = SF;        // R.x is always SF
          const topY = -Rh * (1 - rf); // height decreases toward F
          // Row spans from (baseX, 0) to (baseX, topY * (1-rf)... )
          // Actually let's place chars in a grid within the triangle
          const rowBottom = baseX;
          const rowTop = baseX; // vertical column at this x
          const colHeight = Rh * (baseX / SF); // height at this x = Rh * (x/SF)
          const nV = Math.max(1, Math.round(colHeight / g));
          for (let v = 0; v < nV; v++) {
            const vf = nV > 1 ? v / (nV - 1) : 0;
            let px = baseX;
            let py = -colHeight * vf; // 0=bottom, -colHeight=top
            // Apply fold: rotate around S-F axis (y=0 line), pivot at (baseX, 0)
            [px, py] = rotP(px, py, px, 0, foldInner);
            const ci = Math.min(cols.length-1, Math.floor(rf * 3 + vf * 3));
            const a = 0.6 + rf*0.15 + vf*0.15;
            atlas.draw(ctx,'翼',sz,flash?'#fff':cols[ci],
              sx + px*dir, sy + py + wBeat*(1-rf)*0.5, Math.min(1,a)*alpha);
          }
        }

        // Sub-triangle 2: F(SF,0) → R(SF,-Rh) → T(hypLen,0)
        const n2 = 3; // rows in outer sub-tri
        for (let r = 0; r < n2; r++) {
          const rf = r / (n2 - 1); // 0=F side, 1=T side
          const baseX = SF + FT * rf; // x along F→T
          const colHeight = Rh * (1 - rf); // height at this x decreases toward T
          const nV = Math.max(1, Math.round(colHeight / g));
          for (let v = 0; v < nV; v++) {
            const vf = nV > 1 ? v / (nV - 1) : 0;
            let px = baseX;
            let py = -colHeight * vf;
            // Apply fold: rotate around F-T axis, pivot at (baseX, 0)
            [px, py] = rotP(px, py, px, 0, foldOuter);
            const ci = Math.min(cols.length-1, Math.floor((rf+1)*2 + vf*2));
            const a = 0.55 + rf*0.2 + vf*0.1;
            atlas.draw(ctx,'翼',sz,flash?'#fff':cols[ci],
              sx + px*dir, sy + py + wBeat*(1-rf)*0.4, Math.min(1,a)*alpha);
          }
        }
      };

      // Wing shoulder positions (at body sides)
      const wsy = oy + 24;
      drawWing(-1, ox+cx-14, wsy + wBeat*0.05);
      drawWing( 1, ox+cx+14, wsy - wBeat*0.05);

      // ---- Body layout ----
      const tailWave = Math.sin(t * 4) * 5;

      // Row 0: 角角 (horns) at top
      atlas.draw(ctx,'角',14,flash?'#fff':'#FF6F00', ox+cx-16+sk, oy+0, alpha);
      atlas.draw(ctx,'角',14,flash?'#fff':'#FF6F00', ox+cx+4+sk, oy+0, alpha);

      // Row 1: 魔龙 (head, big)
      atlas.draw(ctx,'魔',26,flash?'#fff':'#111', ox+cx-26+sk, oy+12, alpha);
      atlas.draw(ctx,'龙',26,flash?'#fff':glow, ox+cx+0+sk, oy+12, alpha);

      // Fire FX when breathing
      if (st==='flame_breath'||st==='triple_flame'||st==='summon_flame') {
        const fireX = ox + cx + f * 30;
        atlas.draw(ctx,'火',16,'#FF3D00', fireX+sk, oy+14, 0.7+Math.sin(t*14)*0.3);
        atlas.draw(ctx,'焰',12,'#FF6D00', fireX+f*14+sk, oy+18, 0.5+Math.sin(t*10)*0.3);
      }

      // Row 3: 鳞鳞鳞 (scales body)
      atlas.draw(ctx,'鳞',14,flash?'#fff':'#8B0000', ox+cx-22+sk, oy+38, alpha);
      atlas.draw(ctx,'鳞',14,flash?'#fff':'#6D0000', ox+cx-6+sk, oy+38, alpha);
      atlas.draw(ctx,'鳞',14,flash?'#fff':'#8B0000', ox+cx+10+sk, oy+38, alpha);

      // Row 4: 爪  爪 (claws at bottom)
      atlas.draw(ctx,'爪',16,flash?'#fff':'#D32F2F', ox+cx-20+sk, oy+52, alpha);
      atlas.draw(ctx,'爪',16,flash?'#fff':'#D32F2F', ox+cx+8+sk, oy+52, alpha);

      // Tail: 尾尾 (behind, wavy)
      const tailDir = -f; // tail opposite to facing
      const tailBaseX = ox + cx + tailDir * 28;
      atlas.draw(ctx,'尾',16,flash?'#fff':'#C62828', tailBaseX+sk, oy+40+tailWave, alpha);
      atlas.draw(ctx,'尾',16,flash?'#fff':'#A01010', tailBaseX+tailDir*14+sk, oy+42+tailWave*1.3, alpha*0.9);

      // State FX particles
      if (st==='dash'||st==='dive'||st==='rage_dive') {
        addParticle('暗', m.x+m.w/2, m.y+m.h/2, -f*20, 0, '#D50000', 14, 0.2);
      }
      if (st==='bite' && m.dragonTimer < 0.35) {
        atlas.draw(ctx,'噬',18,'#D50000', ox+cx+f*28+sk, oy+18, 0.6);
      }
      // Phase particles
      if (m.phase>=2 && Math.random()<0.08) {
        addParticle('暗',m.x+(Math.random()-0.5)*m.w,m.y-10,(Math.random()-0.5)*30,-20,'#D50000',10,0.4);
      }
      if (m.phase>=3 && Math.random()<0.06) {
        addParticle('焰',m.x+Math.random()*m.w,m.y+m.h,(Math.random()-0.5)*40,15,'#8B0000',12,0.3);
      }
      break;
    }
  }

  // HP bar
  if (m.hp < m.maxHp) {
    const barW = m.w;
    const barY = oy - 8;
    ctx.fillStyle = '#eee';
    ctx.fillRect(ox, barY, barW, 4);
    ctx.fillStyle = '#F44336';
    ctx.fillRect(ox, barY, barW * (m.hp/m.maxHp), 4);
  }
}

let projectiles = [];
function spawnProjectile(x,y,vx,vy,c,col,dmg) {
  if (projectiles.length > 80) projectiles.splice(0, 20);
  projectiles.push({x,y,vx,vy,c,col,dmg,w:12,h:12,life:3,fromPlayer:false});
}

function updateProjectiles(dt) {
  for (let i=projectiles.length-1;i>=0;i--) {
    const p = projectiles[i];
    if (p.hasGravity) p.vy += GRAVITY * 0.8 * dt;
    p.x += p.vx*dt;
    p.y += p.vy*dt;
    p.life -= dt;
    if (p.life<=0) { projectiles.splice(i,1); continue; }
    if (!p.fromPlayer && !player.dead && aabbHit(p.x-6,p.y-6,12,12,player.x,player.y,player.w,player.h)) {
      hurtPlayer(p.dmg);
      projectiles.splice(i,1);
      continue;
    }
    const gx = Math.floor(p.x/TILE), gy = Math.floor(p.y/TILE);
    if (isSolid(gx,gy)) { projectiles.splice(i,1); continue; }
  }
}

function renderProjectiles(ctx) {
  for (const p of projectiles) {
    const dx = p.x - cam.x + cam.shakeX;
    const dy = p.y - cam.y + cam.shakeY;
    atlas.draw(ctx,p.c,14,p.col,dx-7,dy-7);
  }
}

let items = [];
function spawnItem(type, x, y, nopickup) {
  const cols = {'剑':'#B0BEC5','枪':'#607D8B','甲':'#FFD600','鞋':'#E91E63','长':'#9E9E9E',
    '火':'#FF5722','毒':'#4CAF50','盔':'#FF8F00','钥':'#FDD835','果':'#FF9800',
    '肉':'#D32F2F','丹':'#E040FB','血':'#C62828','霜':'#4FC3F7'};
  items.push({type,x,y,vy:0,w:20,h:20,col:cols[type]||'#999',bobT:Math.random()*6,pickupCd:nopickup?0.5:0});
}

function updateItems(dt) {
  for (const it of items) {
    it.bobT += dt;
    if (it.pickupCd > 0) it.pickupCd -= dt;
    it.vy += GRAVITY*dt;
    it.y += it.vy*dt;
    const gy = Math.floor((it.y+it.h)/TILE);
    const gx = Math.floor((it.x+it.w/2)/TILE);
    if (isSolid(gx,gy)||isPlatform(gx,gy)) {
      it.y = gy*TILE-it.h;
      it.vy = 0;
    }
    if (it.pickupCd <= 0 && aabbHit(it.x,it.y,it.w,it.h,player.x,player.y,player.w,player.h)) {
      if (canEquip(it.type)) {
        if (WEAPONS.has(it.type) && player.weapon) {
          if (input.attackPressed) {
            equipItem(it.type);
            addParticle(it.type, it.x, it.y, 0, -60, it.col, 16, 0.5);
            it.dead = true;
          }
        } else {
          equipItem(it.type);
          addParticle(it.type, it.x, it.y, 0, -60, it.col, 16, 0.5);
          it.dead = true;
        }
      }
    }
  }
  items = items.filter(i=>!i.dead);
}

function renderItems(ctx) {
  for (const it of items) {
    const dx = it.x - cam.x + cam.shakeX;
    const dy = it.y - cam.y + cam.shakeY + Math.sin(it.bobT*3)*3;
    atlas.draw(ctx, it.type, 18, it.col, dx, dy);
    if (WEAPONS.has(it.type) && player.weapon && it.pickupCd <= 0 &&
        aabbHit(it.x-10,it.y-10,it.w+20,it.h+20,player.x,player.y,player.w,player.h)) {
      ctx.save();
      ctx.globalAlpha = 0.5 + 0.3 * Math.sin(it.bobT*4);
      atlas.draw(ctx, '攻', 12, '#F44336', dx+2, dy-16);
      ctx.restore();
    }
  }
}

function checkAttackInteract(ax,ay,aw,ah) {
  const sx = Math.floor(ax/TILE), ex = Math.floor((ax+aw)/TILE);
  const sy = Math.floor(ay/TILE), ey = Math.floor((ay+ah)/TILE);
  for (let y=sy-2;y<=ey+2;y++) {
    for (let x=sx-1;x<=ex+1;x++) {
      if (x<0||y<0||y>=levelH||x>=levelW) continue;
      const ch = levelMap[y]?.[x];
      if (ch==='果') {
        setTile(x,y,'叶');
        spawnItem('果', x*TILE, y*TILE);
      }
      if (ch==='砖') {
        setTile(x,y,'。');
        addParticle('碎', x*TILE+TILE/2, y*TILE+TILE/2, (Math.random()-0.5)*80, -60, '#A1887F', 14, 0.4, 200);
        addParticle('碎', x*TILE+TILE/2, y*TILE+TILE/2, (Math.random()-0.5)*80, -40, '#A1887F', 12, 0.4, 200);
      }
      // Breakable tiles: 草 叶 云 灯 窗
      const brkDef = TILE_DEF[ch];
      if (brkDef && brkDef.breakable && ch!=='砖') {
        setTile(x,y,'。');
        const bc = brkDef.col || '#999';
        addParticle('碎', x*TILE+TILE/2, y*TILE+TILE/2, (Math.random()-0.5)*60, -50, bc, 12, 0.4, 150);
        addParticle(ch, x*TILE+TILE/2, y*TILE+TILE/2, (Math.random()-0.5)*40, -60, bc, 14, 0.35, 100);
      }
      if (ch==='箱') {
        setTile(x,y,'。');
        const loot = ['果','果','肉','丹','盔'][Math.floor(Math.random()*5)];
        spawnItem(loot, x*TILE, y*TILE);
        addParticle('开', x*TILE, y*TILE-10, 0, -40, '#FFC107', 16, 0.5);
      }
    }
  }
}

function checkInteract() {
  const cx = Math.floor((player.x+player.w/2)/TILE);
  const cy = Math.floor((player.y+player.h/2)/TILE);
  for (let dy=-1;dy<=1;dy++) {
    for (let dx=-1;dx<=1;dx++) {
      const gx=cx+dx, gy=cy+dy;
      if (gx<0||gy<0||gy>=levelH||gx>=levelW) continue;
      const ch = levelMap[gy]?.[gx];
      const td = TILE_DEF[ch];
      if (!td || !td.interact) continue;
      if (td.interact==='door') {
        setTile(gx,gy,'。');
        addParticle('开',gx*TILE,gy*TILE-10,0,-40,'#4CAF50',18,0.6);
      }
      if (td.interact==='locked_door' && player.hasKey) {
        setTile(gx,gy,'门');
        player.hasKey = false;
        addParticle('开',gx*TILE,gy*TILE-10,0,-40,'#FFD600',18,0.6);
      }
      if (td.interact==='sign') {
        showMessage(getSignText(gx,gy));
      }
    }
  }
}

let messageText = '';
let messageTimer = 0;
function showMessage(txt) { messageText=txt; messageTimer=3; }

const signTexts = {};
function setSignText(gx,gy,txt) { signTexts[gx+','+gy]=txt; }
function getSignText(gx,gy) { return signTexts[gx+','+gy]||'...'; }

function autoInteractDoors() {
  // Door/路 tiles no longer auto-removed (level transitions use edge detection)
  // Only handle locked doors
  const cx = Math.floor((player.x+player.w/2)/TILE);
  const cy = Math.floor((player.y+player.h/2)/TILE);
  for (let dy=-1;dy<=1;dy++) {
    for (let dx=-1;dx<=1;dx++) {
      const gx=cx+dx, gy=cy+dy;
      if (gx<0||gy<0||gy>=levelH||gx>=levelW) continue;
      const ch = levelMap[gy]?.[gx];
      if (ch==='锁' && player.hasKey) {
        setTile(gx,gy,'路');
        player.hasKey = false;
        addParticle('开',gx*TILE,gy*TILE-10,0,-40,'#FFD600',18,0.6);
      }
    }
  }
}

// Boss levels: no going back to previous level
const BOSS_LEVELS = new Set([9, 11, 13]);

let levelExitX = 0, levelExitY = 0;
function checkLevelExit() {
  if (levelTransitionCd > 0) return false;
  const cx = Math.floor((player.x+player.w/2)/TILE);
  const cy = Math.floor((player.y+player.h/2)/TILE);
  // For vertical levels, use exit coordinate check
  if (LEVELS[currentLevel] && LEVELS[currentLevel].vertical) {
    if (Math.abs(cx-levelExitX)<=1 && Math.abs(cy-levelExitY)<=1) return true;
    return false;
  }
  // For normal levels: player must be at right edge and pressing right
  if (player.x >= levelW * TILE - player.w - 2 && input.right) return true;
  // Also check exit coordinates for enclosed levels (door-based exits)
  if (Math.abs(cx-levelExitX)<=1 && Math.abs(cy-levelExitY)<=1 && input.right) return true;
  return false;
}

// Check if player is at the left edge and pressing left → go to previous level
function checkLevelEntrance() {
  if (levelTransitionCd > 0) return false;
  if (currentLevel <= 0) return false;
  if (BOSS_LEVELS.has(currentLevel)) return false;
  if (LEVELS[currentLevel] && LEVELS[currentLevel].vertical) return false;
  // Also block going back from cutscene levels
  if (LEVELS[currentLevel] && LEVELS[currentLevel].cutscene) return false;
  // Player within the first two tiles and pressing left
  if (player.x <= 2 * TILE && input.left) return true;
  return false;
}

    ctx.fillRect(GAME_W*0.1, GAME_H*0.35, GAME_W*0.8, 40*s);

function renderTouchButtons(ctx) {

    const r = 8;
    ctx.beginPath();
    ctx.roundRect(bx+4, by+4, bw-8, bh-8, r);
    ctx.fillStyle = pressed ? 'rgba(0,0,0,0.18)' : 'rgba(0,0,0,0.06)';

    ctx.strokeStyle = pressed ? 'rgba(0,0,0,0.3)' : 'rgba(0,0,0,0.12)';

    ctx.stroke();

// SECTION 12B: DARKNESS / LIGHTING + FOG SYSTEM
// =============================================================
function renderDarkness(ctx) {
  const sx = Math.max(0, Math.floor(cam.x/TILE)-1);
  const sy = Math.max(0, Math.floor(cam.y/TILE)-1);
  const ex = Math.min(levelW, Math.ceil((cam.x+GAME_W/WORLD_SCALE)/TILE)+1);
  const ey = Math.min(levelH, Math.ceil((cam.y+GAME_H/WORLD_SCALE)/TILE)+1);

  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  for (let y=sy; y<ey; y++) {
    for (let x=sx; x<ex; x++) {
      const ch = levelMap[y]?.[x];
      if (ch === '灯') {
        const lx = (x*TILE + TILE/2 - cam.x) * WORLD_SCALE + cam.shakeX;
        const ly = (y*TILE + TILE/2 - cam.y) * WORLD_SCALE + cam.shakeY;
        const lr = 80 * WORLD_SCALE;
        const flicker = 1 + Math.sin(Date.now()*0.005 + x*3)*0.08;
        const r = lr * flicker;
        const grad = ctx.createRadialGradient(lx, ly, 0, lx, ly, r);
        grad.addColorStop(0, 'rgba(255,214,0,0.18)');
        grad.addColorStop(0.4, 'rgba(255,180,0,0.08)');
        grad.addColorStop(1, 'rgba(255,150,0,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(lx-r, ly-r, r*2, r*2);
      }
    }
  }
  ctx.restore();

  // Fog overlay when player has fog effect active
  if (player.inFog && player.fogTimer > 0) {
    const fogAlpha = Math.min(0.55, player.fogTimer * 0.15);
    ctx.save();
    ctx.fillStyle = `rgba(180,180,195,${fogAlpha})`;
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    ctx.restore();
  }
}

function startLevel(idx) {
  if (idx >= LEVELS.length) { scene = 'victory'; return; }
  // Check if this level is a cutscene trigger
  const lv = LEVELS[idx];
  if (lv.cutscene === 'fusion') {
    currentLevel = idx;
    currentLevelName = lv.name;
    startFusionCutscene();
    return;
  }
  currentLevel = idx;
  currentLevelName = lv.name;
  loadLevel(lv.map);
  player.x = lv.playerStart[0]*TILE;
  player.y = lv.playerStart[1]*TILE - player.h;
  player.vx = 0; player.vy = 0;
  player.fogTimer = 0; player.inFog = false;
  player.hurtTimer = 0; player.dead = false;
  player.onIce = false; player.mudSlow = 0; player.windForce = 0;
  player.poisonTimer = 0;
  player.dashState = 'none'; player.dashTimer = 0; player.dashCooldown = 0;
  player.plungeState = 'none'; player.plungeTimer = 0; player.attackHoldTime = 0;
  levelExitX = lv.exit[0];
  levelExitY = lv.exit[1];

  // Apply weather/atmosphere from level config
  resetWeather();
  if (lv.weather) weatherState.type = lv.weather;
  if (lv.darkSky) weatherState.darkSky = true;
  if (lv.bgColor) weatherState.bgColor = lv.bgColor;

  monsters = [];
  for (const [type,mx,my] of mapMonsters) {
    monsters.push(createMonster(type, mx*TILE, my*TILE-32));
  }
  for (const [type,mx,my] of (lv.monsters||[])) {
    monsters.push(createMonster(type, mx*TILE, my*TILE-32));
  }
  items = [];
  for (const [type,ix,iy] of mapItems) {
    spawnItem(type, ix*TILE, iy*TILE);
  }
  for (const [type,ix,iy] of (lv.items||[])) {
    spawnItem(type, ix*TILE, iy*TILE);
  }
  projectiles = [];
  particles.length = 0;
  for (const [sx,sy,txt] of (lv.signs||[])) {
    setSignText(sx,sy,txt);
  }

  // Enhance final boss 
  if (idx === LEVELS.length - 1) {
    for (const m of monsters) {
      if (m.type === '魔龙') {
        m.hp = 40;
        m.maxHp = 40;
      }
    }
  }

  scene = 'gameplay';
  levelNameTimer = 3; // show level name overlay for 3 seconds
  levelTransitionCd = 0.5; // prevent immediate re-trigger
  // Snap camera instantly to player position (no smooth pan)
  cam.snap(player.x+player.w/2, player.y+player.h/2, levelW*TILE, levelH*TILE);
}

// Start a level but place player at the right end (for going back)
function startLevelFromEnd(idx) {
  if (idx < 0) return;
  startLevel(idx);
  const lv = LEVELS[idx];
  const spawnY = lv.exit ? lv.exit[1] : (lv.playerStart ? lv.playerStart[1] : 5);
  // Use exit X coordinate if it's an enclosed level (exit not at right edge)
  let spawnX;
  if (lv.exit && lv.exit[0] < levelW - 2) {
    spawnX = lv.exit[0];
  } else {
    spawnX = levelW - 2;
  }
  player.x = spawnX * TILE;
  player.y = spawnY * TILE - player.h;
  player.vx = 0; player.vy = 0;
  // Open any door tile at exit so player isn't stuck
  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      const gx = spawnX + dx, gy = Math.floor(spawnY) + dy;
      if (gx >= 0 && gy >= 0 && gy < levelH && gx < levelW) {
        const ch = levelMap[gy] && levelMap[gy][gx];
        if (ch === '门' || ch === '路' || ch === '锁') {
          setTile(gx, gy, '。');
        }
      }
    }
  }
  // Re-snap camera to new position
  cam.snap(player.x+player.w/2, player.y+player.h/2, levelW*TILE, levelH*TILE);
}

function renderTitle(ctx) {
  ctx.fillStyle = '#fff';
  ctx.fillRect(0,0,GAME_W,GAME_H);
  const s = SCALE;

  if (menuState === 'main') {
    const t = titleBlink;

    // ---- Static title: 文字冒险游戏 (black, large, moved down) ----
    const title = '文字冒险游戏';
    const titleSz = 36*s;
    const titleSpacing = titleSz * 1.05;
    const titleTotalW = title.length * titleSpacing;
    const titleX0 = GAME_W/2 - titleTotalW/2;
    const titleY = GAME_H*0.25;
    for (let i=0;i<title.length;i++) {
      atlas.draw(ctx, title[i], titleSz, '#111', titleX0 + i*titleSpacing, titleY);
    }
    // English subtitle
    ctx.fillStyle = '#999';
    ctx.font = `${11*s}px ${FONT_FAMILY}`;
    ctx.textAlign = 'center';
    ctx.fillText('Chinese Character Action Adventure', GAME_W/2, titleY + titleSz + 10*s);
    ctx.textAlign = 'start';

    // ---- Dragon boss (top-right of title text) ----
    const drOx = titleX0 + titleTotalW - 20*s;
    const drOy = titleY - 70*s + Math.sin(t*2)*4*s;
    const drCx = 40;
    const drSk = 0;
    const drGlow = '#B71C1C';
    // Wing fold animation
    const drWp = 0.35 + Math.sin(t*1.2)*0.1;
    const drWBeat = Math.sin(t*3)*3;
    // Wing triangle geometry (same as game)
    const drSz = 14*s/SCALE; // match game size relative
    const drG = drSz * 1.3;
    const drHypLen = drG * 6;
    const drSF = drHypLen * 3/4;
    const drFT = drHypLen / 4;
    const drRh = drHypLen * Math.sqrt(3)/4;
    const drFoldInner = (1-drWp)*Math.PI*0.5;
    const drFoldOuter = (1-drWp)*Math.PI*0.45;
    const drRotP = (px,py,pivX,pivY,ang) => {
      const dx=px-pivX, dy=py-pivY;
      const c=Math.cos(ang), sn=Math.sin(ang);
      return [pivX+dx*c-dy*sn, pivY+dx*sn+dy*c];
    };
    const drCols = ['#1A0000','#2D0000','#440000','#5C0000','#700000','#8B0000','#A01010'];
    const drawTitleWing = (dir, sx, sy) => {
      for (let r=0;r<4;r++) {
        const rf=r/3;
        const baseX=drSF*rf;
        const colH=drRh*(baseX/drSF);
        const nV=Math.max(1,Math.round(colH/drG));
        for (let v=0;v<nV;v++) {
          const vf=nV>1?v/(nV-1):0;
          let px=baseX, py=-colH*vf;
          [px,py]=drRotP(px,py,px,0,drFoldInner);
          const ci=Math.min(drCols.length-1,Math.floor(rf*3+vf*3));
          atlas.draw(ctx,'翼',drSz,drCols[ci],sx+px*dir,sy+py+drWBeat*(1-rf)*0.5,0.8);
        }
      }
      for (let r=0;r<3;r++) {
        const rf=r/2;
        const baseX=drSF+drFT*rf;
        const colH=drRh*(1-rf);
        const nV=Math.max(1,Math.round(colH/drG));
        for (let v=0;v<nV;v++) {
          const vf=nV>1?v/(nV-1):0;
          let px=baseX, py=-colH*vf;
          [px,py]=drRotP(px,py,px,0,drFoldOuter);
          const ci=Math.min(drCols.length-1,Math.floor((rf+1)*2+vf*2));
          atlas.draw(ctx,'翼',drSz,drCols[ci],sx+px*dir,sy+py+drWBeat*(1-rf)*0.4,0.75);
        }
      }
    };
    const drWsy = drOy + 24;
    drawTitleWing(-1, drOx+drCx-14, drWsy+drWBeat*0.05);
    drawTitleWing(1, drOx+drCx+14, drWsy-drWBeat*0.05);
    // Body layout (same as game)
    atlas.draw(ctx,'角',14,'#FF6F00', drOx+drCx-16, drOy+0);
    atlas.draw(ctx,'角',14,'#FF6F00', drOx+drCx+4, drOy+0);
    atlas.draw(ctx,'魔',26,'#111', drOx+drCx-26, drOy+12);
    atlas.draw(ctx,'龙',26,drGlow, drOx+drCx+0, drOy+12);
    atlas.draw(ctx,'鳞',14,'#8B0000', drOx+drCx-22, drOy+38);
    atlas.draw(ctx,'鳞',14,'#6D0000', drOx+drCx-6, drOy+38);
    atlas.draw(ctx,'鳞',14,'#8B0000', drOx+drCx+10, drOy+38);
    atlas.draw(ctx,'爪',16,'#D32F2F', drOx+drCx-20, drOy+52);
    atlas.draw(ctx,'爪',16,'#D32F2F', drOx+drCx+8, drOy+52);
    const drTailWave = Math.sin(t*4)*5;
    atlas.draw(ctx,'尾',16,'#C62828', drOx+drCx-28, drOy+40+drTailWave);
    atlas.draw(ctx,'尾',16,'#A01010', drOx+drCx-42, drOy+42+drTailWave*1.3, 0.9);

    // ---- Player character (centered below title, walking) ----
    const pWalkRange = titleTotalW * 0.4;
    const pWalkCenter = GAME_W/2;
    const pWalkX = pWalkCenter + Math.sin(t*0.6) * pWalkRange;
    const pOx = pWalkX - 14;
    const pOy = titleY + titleSz + 28*s;
    const pSz = 13;
    const pHSz = 16;
    const pBob = Math.abs(Math.sin(t*3))*2;
    const pLeg = Math.sin(t*4)*3;
    const pCx = pOx + 14;
    const pFacing = Math.cos(t*0.6) >= 0 ? 1 : -1;
    // Head
    atlas.draw(ctx,'头',pHSz,'#4E342E', pCx-pHSz/2, pOy+pBob);
    // Body
    atlas.draw(ctx,'身',pSz,'#1565C0', pCx-pSz/2, pOy+pHSz+pBob);
    atlas.draw(ctx,'体',pSz,'#1565C0', pCx-pSz/2, pOy+pHSz+pSz+pBob);
    // Hands (offset based on facing direction)
    atlas.draw(ctx,'手',pSz,'#4E342E', pCx-pSz/2-pSz, pOy+pHSz+pBob);
    atlas.draw(ctx,'手',pSz,'#4E342E', pCx+pSz/2, pOy+pHSz+pBob);
    // Sword (火剑) in leading hand, with swing
    const sAngle = Math.sin(t*3)*0.3 - 1.05;
    const swordHandX = pFacing === 1 ? pCx+pSz/2+pSz : pCx-pSz/2-pSz;
    ctx.save();
    ctx.translate(swordHandX, pOy+pHSz+pSz/2+pBob);
    ctx.scale(pFacing, 1);
    ctx.rotate(sAngle);
    atlas.draw(ctx,'火',pSz,'#FF5722', 0, -pSz/2);
    atlas.draw(ctx,'剑',pSz,'#B0BEC5', pSz, -pSz/2);
    ctx.restore();
    // Feet walking
    atlas.draw(ctx,'脚',pSz,'#4E342E', pCx-pSz+pLeg, pOy+pHSz+pSz*2+pBob);
    atlas.draw(ctx,'脚',pSz,'#4E342E', pCx-pLeg, pOy+pHSz+pSz*2+pBob);

    // ---- Menu buttons (larger) ----
    const items = ['开始游戏','操作说明'];
    const btnSz = 22*s;

    const btnGap = 46*s;
    for (let i=0;i<items.length;i++) {

      }

  } else if (menuState === 'controls') {
    // ---- Controls screen ----
    drawTextLine(ctx, '操作说明', 22*s, '#333', GAME_W/2-22*s*1.05*2, GAME_H*0.08);

// Click/tap handler for menus
function getClickY(e) {
  const rect = canvas.getBoundingClientRect();
  const clientY = e.clientY !== undefined ? e.clientY : (e.touches?e.touches[0].clientY:0);
  return (clientY - rect.top) / rect.height;
}

function getClickPos(e) {
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX !== undefined ? e.clientX : (e.touches?e.touches[0].clientX:0);
  const cy = e.clientY !== undefined ? e.clientY : (e.touches?e.touches[0].clientY:0);
  return { x: (cx - rect.left) / rect.width * GAME_W, y: (cy - rect.top) / rect.height * GAME_H };
}
function hitRect(pos, r) { return r && pos.x >= r.x && pos.x <= r.x+r.w && pos.y >= r.y && pos.y <= r.y+r.h; }

function handleClickEvent(e) {
  if (scene === 'title') {
    handleTitleClick(getClickY(e));
  } else if (scene === 'death') {
    const pos = getClickPos(e);
    if (hitRect(pos, deathBtn1)) { deathMenuSel = 0; handleMenuAction(); }
    else if (hitRect(pos, deathBtn2)) { deathMenuSel = 1; handleMenuAction(); }
  } else if (scene === 'victory') {
    handleMenuAction();
  }
}

canvas.addEventListener('click', handleClickEvent);
canvas.addEventListener('touchstart', e => {
  if (scene==='title'||scene==='death'||scene==='victory') {
    e.preventDefault();
    handleClickEvent(e);
  }
}, {passive:false});

function handleTitleClick(yFrac) {
  if (menuState === 'main') {
    // Buttons at 0.55 with 46*s gap
    const s = SCALE;
    const btnY0 = 0.52;
    const btnGap = 46*s / GAME_H;
    const btnH = 36*s / GAME_H;
    for (let i=0;i<2;i++) {
      const top = btnY0 + i*btnGap - 0.01;
      const bot = top + btnH;
      if (yFrac >= top && yFrac <= bot) {
        menuSel = i;
        if (i===0) { resetPlayer(); storyChars.length=0; startLevel(0); }
        else if (i===1) { menuState='controls'; menuSel=0; }
        return;
      }
    }
  } else if (menuState === 'controls') {
    // Back button at ~0.85+
    if (yFrac >= 0.85) {
      menuState = 'main';
      menuSel = 1;
    }
  }
}

function handleMenuAction() {
  if (scene==='title') {
    // Fallback: if clicking anywhere on title main, start game
    if (menuState==='main') {
      resetPlayer();
      startLevel(0);
    }
  } else if (scene==='death') {
    if (deathMenuSel === 0) {
      // Continue game: restart current level, keep weapon
      const savedWeapon = player.weapon;
      const deathX = player.x;
      const deathY = player.y;
      // Determine which modifiers survive (50% each)
      const droppedMods = [];
      if (player.fireWeapon && Math.random() < 0.5) droppedMods.push('火');
      if (player.poisonWeapon && Math.random() < 0.5) droppedMods.push('毒');
      if (player.longWeapon && Math.random() < 0.5) droppedMods.push('长');
      if (player.frostWeapon && Math.random() < 0.5) droppedMods.push('霜');

      resetPlayer();
      startLevel(currentLevel);

      // Restore base weapon
      if (savedWeapon) {
        player.weapon = savedWeapon;
        recalcStats();
      }
      // Spawn surviving modifiers at death position
      for (let i = 0; i < droppedMods.length; i++) {
        spawnItem(droppedMods[i], deathX + (i - 1) * 20, deathY);
      }
    } else {
      // Back to title: lose all progress
      resetPlayer();
      storyChars.length = 0;
      Object.keys(killStats).forEach(k => delete killStats[k]);
      resetWeather();
      scene = 'title';
      menuState = 'main';
      menuSel = 0;
    }
  } else if (scene==='victory') {
    resetPlayer();
    storyChars.length = 0;
    Object.keys(killStats).forEach(k => delete killStats[k]);
    resetWeather();
    scene = 'title';
    menuState = 'main';
    menuSel = 0;
  }
}

// =============================================================
// SECTION 15: MAIN GAME LOOP
// =============================================================
let lastTime = 0;

function gameLoop(ts) {
  const dt = Math.min(0.05, (ts - lastTime)/1000);
  lastTime = ts;

  try {
  updateKeyboardInput();
  updateTouchInput();

  switch(scene) {
    case 'title':
      updateTitle(dt);
      break;
    case 'gameplay':
      if (levelNameTimer > 0) levelNameTimer -= dt;
      if (levelTransitionCd > 0) levelTransitionCd -= dt;
      playerUpdate(dt);
      for (const m of monsters) {
        try { updateMonster(m,dt); } catch(e) { m.dead=true; m.deathTimer=0; }
      }
      monsters = monsters.filter(m => !m.dead || m.deathTimer > 0);
      updateProjectiles(dt);
      // Lava drip system: '熔' tiles periodically drip lava projectiles downward
      lavaDripTimer -= dt;
      if (lavaDripTimer <= 0) {
        lavaDripTimer = 1.8; // drip every 1.8 seconds
        const viewL = Math.max(0, Math.floor((cam.x - 60) / TILE));
        const viewR = Math.min(levelW - 1, Math.floor((cam.x + C.width + 60) / TILE));
        const viewT = Math.max(0, Math.floor((cam.y - 60) / TILE));
        const viewB = Math.min(levelH - 1, Math.floor((cam.y + C.height + 60) / TILE));
        for (let gy = viewT; gy <= viewB; gy++) {
          for (let gx = viewL; gx <= viewR; gx++) {
            if (levelMap[gy] && levelMap[gy][gx] === '熔') {
              // Drip lava downward from bottom of tile
              const dx = gx * TILE + TILE / 2 + (Math.random() - 0.5) * 8;
              const dy = gy * TILE + TILE;
              spawnProjectile(dx, dy, (Math.random() - 0.5) * 15, 80 + Math.random() * 40, '岩', '#FF6D00', 1);
              addParticle('滴', dx, dy, 0, 10, '#E65100', 10, 0.3);
            }
          }
        }
      }
      updateItems(dt);
      updateParticles(dt);
      cam.follow(player.x+player.w/2, player.y+player.h/2, levelW*TILE, levelH*TILE, dt);
      cam.update(dt);
      messageTimer = Math.max(0, messageTimer-dt);
      if (input.interact || input.attackPressed) checkInteract();
      // Normal attack logic with plunge deferral
      if (input.attackPressed && player.attackCooldown <= 0 && player.dashState === 'none' && player.plungeState === 'none') {
        if (player.grounded || player.coyoteTime > 0) {
          // On ground or near-ground: attack immediately
          player.attackTimer = 0.2;
          player.attackCooldown = 0.35;
          doPlayerAttack();
          player._airAtkPending = false;
        } else {
          // In air: defer to allow plunge detection
          player._airAtkPending = true;
        }
      }
      // Deferred air attack: fires when attack key released quickly (tap, not hold)
      if (player._airAtkPending && !input.attack && player.plungeState === 'none' && player.dashState === 'none') {
        if (player.attackCooldown <= 0) {
          player.attackTimer = 0.2;
          player.attackCooldown = 0.35;
          doPlayerAttack();
        }
        player._airAtkPending = false;
      }
      // Clear pending if plunge triggered or landed
      if (player.plungeState !== 'none') {
        player._airAtkPending = false;
      }
      if (player.grounded && player._airAtkPending && player.attackCooldown <= 0) {
        // Landed while pending: fire the attack
        player.attackTimer = 0.2;
        player.attackCooldown = 0.35;
        doPlayerAttack();
        player._airAtkPending = false;
      }
      autoInteractDoors();
      // Burning/poison DoT (2 damage per tick)
      for (const m of monsters) {
        if (m.dead) continue;
        if (m.burning > 0 && Math.random() < dt) { m.hp-=2; if(m.hp<=0){m.dead=true;m.deathTimer=0.5;if(!killStats[m.type])killStats[m.type]=0;killStats[m.type]++;} }
        if (m.poisoned > 0 && Math.random() < dt*0.5) { m.hp-=2; if(m.hp<=0){m.dead=true;m.deathTimer=0.5;if(!killStats[m.type])killStats[m.type]=0;killStats[m.type]++;} }
      }
      if (player.dead) { titleBlink=0; deathMenuSel=0; deathBtn1=null; deathBtn2=null; scene='death'; }
      // Level transitions
      const hasBoss = monsters.some(m=>(m.type==='魔王'||m.type==='魔龙'||m.type==='火龙')&&!m.dead);
      // Forward: reach right edge and press right
      if (checkLevelExit()) {
        if (!hasBoss) startLevel(currentLevel+1);
      }
      // Backward: at left edge and press left
      if (checkLevelEntrance()) {
        // Skip cutscene levels when going backward
        let prevIdx = currentLevel - 1;
        while (prevIdx >= 0 && LEVELS[prevIdx] && LEVELS[prevIdx].cutscene) {
          prevIdx--;
        }
        if (prevIdx >= 0) startLevelFromEnd(prevIdx);
      }
      // Update weather
      updateWeather(dt);
      // Safety: clamp projectiles and particles
      if (projectiles.length > 100) projectiles.length = 100;
      if (particles.length > 350) particles.length = 300;
      break;
    case 'cutscene_fusion':
      updateCutscene(dt);
      updateParticles(dt);
      break;
  }
  } catch(e) { /* prevent crash */ }

  // Render
  ctx.fillStyle = weatherState.bgColor || '#fff';
  ctx.fillRect(0,0,GAME_W,GAME_H);

  _renderPhase = true;
  try {
  switch(scene) {
    case 'title':
      renderTitle(ctx);
      break;
    case 'gameplay':
      ctx.save();
      ctx.scale(WORLD_SCALE, WORLD_SCALE);
      renderTiles(ctx);
      renderItems(ctx);
      for (const m of monsters) {
        try { renderMonster(ctx,m); } catch(e) { /* skip broken monster render */ }
      }
      renderPlayer(ctx);
      renderProjectiles(ctx);
      renderParticles(ctx);
      ctx.restore();
      renderDarkness(ctx);
      renderWeatherOverlay(ctx);
      renderHUD(ctx);
      // Level name overlay (fades out over 3 seconds)
      if (levelNameTimer > 0) {
        const lnAlpha = Math.min(1, levelNameTimer / 0.5); // fade out in last 0.5s
        const s = SCALE;
        ctx.globalAlpha = lnAlpha * 0.9;
        const lnTxt = '第' + cnNum(currentLevel) + '幕 ' + currentLevelName;
        const lnSz = 14 * s;
        // Dark background pill
        const lnW = lnTxt.length * lnSz * 1.1 + 16 * s;
        const lnH = lnSz + 12 * s;
        const lnX = 6 * s;
        const lnY = 56 * s;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.beginPath(); ctx.roundRect(lnX, lnY, lnW, lnH, 4); ctx.fill();
        // Text
        for (let i = 0; i < lnTxt.length; i++) {
          atlas.draw(ctx, lnTxt[i], lnSz, '#fff', lnX + 8 * s + i * lnSz * 1.1, lnY + 6 * s);
        }
        ctx.globalAlpha = 1;
      }
      renderTouchButtons(ctx);
      break;
    case 'cutscene_fusion':
      renderCutscene(ctx);
      break;
    case 'death':
      titleBlink += dt;
      ctx.save();
      ctx.scale(WORLD_SCALE, WORLD_SCALE);
      renderTiles(ctx);
      for (const m of monsters) {
        try { renderMonster(ctx,m); } catch(e) {}
      }
      renderParticles(ctx);
      ctx.restore();
      renderDeath(ctx);
      break;
    case 'victory':
      titleBlink += dt;
      renderVictory(ctx);
      break;
  }
  } catch(e) { /* prevent render crash */ }
  _renderPhase = false;
  flushPendingParticles();

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

// Debug helper for testing
window._dbg = {
  get scene() { return scene; },
  set scene(v) { scene = v; },
  get player() { return player; },
  get monsters() { return monsters; },
  get levelW() { return levelW; },
  get levelH() { return levelH; },
  get killStats() { return killStats; },
  get deathMenuSel() { return deathMenuSel; },
  set deathMenuSel(v) { deathMenuSel = v; },
  get titleBlink() { return titleBlink; },
  set titleBlink(v) { titleBlink = v; },
  get levelNameTimer() { return levelNameTimer; },
  get TILE_DEF() { return TILE_DEF; },
  resetPlayer() { resetPlayer(); },
  startLevel(n) { currentLevel = n; startLevel(n); },
  recalcStats() { recalcStats(); },
  get levelName() { return currentLevelName; },
};
</script>
